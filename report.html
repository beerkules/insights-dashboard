<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Campaign Report — Hashtag Hamburg</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #111111; --bg-card: #1a1a1a; --bg-input: #1e1e1e;
    --blue: #38B6FF; --blue-dark: #1A8FCC; --blue-glow: rgba(56,182,255,0.25);
    --green: #34D399; --pink: #F472B6; --red: #F87171;
    --orange: #FB923C; --tiktok: #ff0050;
    --text: #ffffff; --text-sec: #aaaaaa; --text-muted: #555555;
    --border: rgba(255,255,255,0.08); --border-light: rgba(255,255,255,0.12);
    --radius: 16px; --radius-sm: 10px; --radius-xs: 6px;
  }

  body {
    font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, sans-serif;
    background: radial-gradient(ellipse at 20% 0%, rgba(56,182,255,0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 30%, rgba(56,182,255,0.04) 0%, transparent 50%), var(--bg);
    color: var(--text); line-height: 1.6; -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  .container { max-width: 1100px; margin: 0 auto; padding: 40px 24px 80px; }

  /* Header */
  .report-header {
    text-align: center; padding: 48px 0 40px;
  }
  .report-header img { width: 180px; margin-bottom: 24px; }
  .report-header h1 {
    font-size: 28px; font-weight: 700; margin-bottom: 8px;
  }
  .report-header .subtitle {
    font-size: 14px; color: var(--text-sec); font-weight: 400;
  }

  /* Summary Cards */
  .summary-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 16px; margin-bottom: 40px;
  }
  .summary-card {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 20px; text-align: center;
  }
  .summary-card .value {
    font-size: 28px; font-weight: 700; color: var(--blue);
  }
  .summary-card .label {
    font-size: 11px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 1.5px; color: var(--text-sec); margin-top: 4px;
  }

  /* Post Cards */
  .posts-section h2 {
    font-size: 18px; font-weight: 700; margin-bottom: 20px;
    display: flex; align-items: center; gap: 10px;
  }
  .platform-badge {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 11px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 1px; padding: 4px 10px; border-radius: 20px;
  }
  .platform-badge.instagram { background: linear-gradient(135deg, #833AB4, #E1306C, #F77737); color: #fff; }
  .platform-badge.tiktok { background: var(--tiktok); color: #fff; }

  .post-card {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 28px; margin-bottom: 20px;
    transition: border-color 0.2s;
  }
  .post-card:hover { border-color: var(--blue); }

  .post-meta {
    display: flex; align-items: center; gap: 12px; margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .post-type {
    font-size: 11px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 1px; padding: 3px 8px; border-radius: 4px;
    background: rgba(56,182,255,0.15); color: var(--blue);
  }
  .post-date { font-size: 13px; color: var(--text-sec); }
  .post-caption {
    font-size: 13px; color: var(--text-sec); line-height: 1.6;
    margin-bottom: 20px; max-height: 60px; overflow: hidden;
    position: relative;
  }
  .post-caption::after {
    content: ''; position: absolute; bottom: 0; left: 0; right: 0;
    height: 30px; background: linear-gradient(transparent, var(--bg-card));
  }

  .metrics-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    gap: 12px;
  }
  .metric {
    background: var(--bg-input); border-radius: var(--radius-xs);
    padding: 14px; text-align: center;
  }
  .metric .num {
    font-size: 22px; font-weight: 700; color: var(--text);
  }
  .metric .lbl {
    font-size: 10px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 1px; color: var(--text-muted); margin-top: 2px;
  }
  .metric.highlight .num { color: var(--blue); }

  .post-link {
    display: inline-block; margin-top: 16px; font-size: 12px;
    color: var(--blue); text-decoration: none; font-weight: 600;
  }
  .post-link:hover { text-decoration: underline; }

  /* Loading / Error */
  .loading, .error-msg {
    text-align: center; padding: 80px 20px;
  }
  .loading .spinner {
    width: 40px; height: 40px; border: 3px solid var(--border);
    border-top-color: var(--blue); border-radius: 50%;
    animation: spin 0.8s linear infinite; margin: 0 auto 20px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-msg h2 { color: var(--red); margin-bottom: 8px; }

  /* Footer */
  .report-footer {
    text-align: center; padding: 40px 0 20px;
    font-size: 12px; color: var(--text-muted);
  }
  .report-footer a { color: var(--blue); text-decoration: none; }

  @media (max-width: 600px) {
    .summary-grid { grid-template-columns: repeat(2, 1fr); }
    .metrics-grid { grid-template-columns: repeat(2, 1fr); }
    .report-header h1 { font-size: 22px; }
  }
</style>
</head>
<body>

<div class="container">
  <!-- Header -->
  <div class="report-header">
    <img src="logo.svg" alt="Hashtag Hamburg">
    <h1 id="reportTitle">Campaign Report</h1>
    <div class="subtitle" id="reportSubtitle">Wird geladen...</div>
  </div>

  <!-- Loading -->
  <div class="loading" id="loadingState">
    <div class="spinner"></div>
    <div style="color: var(--text-sec); font-size: 14px;">Insights werden geladen...</div>
  </div>

  <!-- Error -->
  <div class="error-msg" id="errorState" style="display:none;">
    <h2>Report nicht gefunden</h2>
    <p style="color: var(--text-sec);">Dieser Link ist ungültig oder der Report existiert nicht mehr.</p>
  </div>

  <!-- Content (hidden until loaded) -->
  <div id="reportContent" style="display:none;">
    <!-- Summary -->
    <div class="summary-grid" id="summaryGrid"></div>

    <!-- Posts -->
    <div class="posts-section" id="postsSection"></div>
  </div>

  <div class="report-footer">
    Erstellt von <a href="https://hashtaghamburg.de" target="_blank">Hashtag Hamburg</a>
  </div>
</div>

<script>
(async function() {
  const params = new URLSearchParams(window.location.search);
  const token = params.get('t');

  if (!token) {
    showError();
    return;
  }

  try {
    // 1. Load report config
    const configRes = await fetch(`/api/reports?t=${token}`);
    if (!configRes.ok) { showError(); return; }
    const configData = await configRes.json();
    if (!configData.success) { showError(); return; }

    const report = configData.data;
    document.getElementById('reportTitle').textContent = `Report: ${report.clientName}`;
    document.getElementById('reportSubtitle').textContent =
      `Erstellt am ${new Date(report.createdAt).toLocaleDateString('de-DE')} · ${report.posts.length} Post${report.posts.length > 1 ? 's' : ''}`;
    document.title = `${report.clientName} — Campaign Report`;

    // 2. Fetch insights for each post
    const results = [];
    for (const post of report.posts) {
      try {
        let insightData;
        if (post.platform === 'instagram') {
          const res = await fetch('/api/insights', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(post.mediaId ? { mediaId: post.mediaId } : { url: post.url }),
          });
          const json = await res.json();
          insightData = json.data || json;
        } else if (post.platform === 'tiktok') {
          // TikTok API (future)
          insightData = { platform: 'tiktok', type: 'Video', insights: {}, permalink: post.url, caption: 'TikTok Video' };
        }
        if (insightData) results.push({ ...insightData, _postUrl: post.url, _platform: post.platform });
      } catch (e) {
        results.push({ error: e.message, _postUrl: post.url, _platform: post.platform });
      }
    }

    // 3. Render summary
    renderSummary(results);

    // 4. Render posts
    renderPosts(results);

    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('reportContent').style.display = 'block';

  } catch (e) {
    console.error(e);
    showError();
  }
})();

function showError() {
  document.getElementById('loadingState').style.display = 'none';
  document.getElementById('errorState').style.display = 'block';
}

function fmt(n) {
  if (n === null || n === undefined) return '—';
  if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
  if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
  return n.toLocaleString('de-DE');
}

function renderSummary(results) {
  const grid = document.getElementById('summaryGrid');
  const valid = results.filter(r => r.insights);

  let totalReach = 0, totalLikes = 0, totalComments = 0, totalShares = 0, totalSaves = 0, totalInteractions = 0;
  for (const r of valid) {
    const i = r.insights || {};
    totalReach += i.reach || 0;
    totalLikes += i.likes || 0;
    totalComments += i.comments || 0;
    totalShares += i.shares || 0;
    totalSaves += i.saves || 0;
    totalInteractions += i.totalInteractions || 0;
  }

  const metrics = [
    { value: fmt(totalReach), label: 'Reach' },
    { value: fmt(totalInteractions || (totalLikes + totalComments + totalShares + totalSaves)), label: 'Interactions' },
    { value: fmt(totalLikes), label: 'Likes' },
    { value: fmt(totalComments), label: 'Comments' },
    { value: fmt(totalShares), label: 'Shares' },
    { value: fmt(totalSaves), label: 'Saves' },
  ];

  grid.innerHTML = metrics.map(m => `
    <div class="summary-card">
      <div class="value">${m.value}</div>
      <div class="label">${m.label}</div>
    </div>
  `).join('');
}

function renderPosts(results) {
  const section = document.getElementById('postsSection');

  section.innerHTML = results.map((r, idx) => {
    if (r.error) {
      return `<div class="post-card">
        <div class="post-meta">
          <span class="platform-badge ${r._platform}">${r._platform}</span>
          <span class="post-date" style="color: var(--red);">Fehler: ${r.error}</span>
        </div>
      </div>`;
    }

    const i = r.insights || {};
    const platform = r._platform || r.platform || 'instagram';
    const caption = r.caption ? r.caption.substring(0, 200) : '';

    let metricsHTML = '';
    const metricItems = [
      { num: fmt(i.reach), lbl: 'Reach', hl: true },
      { num: fmt(i.likes), lbl: 'Likes' },
      { num: fmt(i.comments), lbl: 'Comments' },
      { num: fmt(i.shares), lbl: 'Shares' },
      { num: fmt(i.saves), lbl: 'Saves' },
      { num: fmt(i.totalInteractions), lbl: 'Total' },
    ];

    // Add reel-specific metrics
    if (i.avgWatchTime) {
      metricItems.push({ num: (i.avgWatchTime / 1000).toFixed(1) + 's', lbl: 'Avg Watch' });
    }
    if (i.totalWatchTime) {
      const hours = (i.totalWatchTime / 1000 / 3600).toFixed(1);
      metricItems.push({ num: hours + 'h', lbl: 'Watch Time' });
    }

    metricsHTML = metricItems.map(m =>
      `<div class="metric${m.hl ? ' highlight' : ''}">
        <div class="num">${m.num}</div>
        <div class="lbl">${m.lbl}</div>
      </div>`
    ).join('');

    return `<div class="post-card">
      <div class="post-meta">
        <span class="platform-badge ${platform}">${platform}</span>
        <span class="post-type">${r.type || 'Post'}</span>
        <span class="post-date">${r.date || ''}</span>
      </div>
      ${caption ? `<div class="post-caption">${caption}</div>` : ''}
      <div class="metrics-grid">${metricsHTML}</div>
      ${r.permalink ? `<a class="post-link" href="${r.permalink}" target="_blank">Post ansehen →</a>` : ''}
    </div>`;
  }).join('');
}
</script>
</body>
</html>
