<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Campaign Report - Hashtag Hamburg</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --black: #000000;
    --white: #FFFFFF;
    --blue: #38B6FF;
    --blue-dark: #1A8FCC;
    --blue-light: #D6EEFF;
    --anthrazit: #111111;
    --grau: #888888;
    --hellgrau: #F2F2F2;
    --border: #E5E5E5;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.05);
    --shadow-md: 0 4px 16px rgba(0,0,0,0.06);
    --shadow-lg: 0 8px 32px rgba(0,0,0,0.08);
    --radius: 16px;
    --radius-sm: 12px;
    --radius-xs: 8px;
  }

  body {
    font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--white);
    color: var(--anthrazit);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  /* Hero - Black background per Brand Guidelines */
  .hero {
    background: var(--black);
    padding: 48px 24px 56px;
    text-align: center;
    position: relative;
  }
  .hero::after {
    content: '';
    position: absolute;
    bottom: 0; left: 50%; transform: translateX(-50%);
    width: 80px; height: 3px;
    background: var(--blue);
    border-radius: 2px;
  }
  .hero-content { position: relative; max-width: 700px; margin: 0 auto; }
  .hero img { width: 140px; margin-bottom: 32px; filter: brightness(10); }
  .hero h1 {
    font-size: 28px; font-weight: 800; color: var(--white);
    letter-spacing: -0.5px; line-height: 1.2;
  }
  .hero .subtitle {
    font-size: 13px; color: var(--grau); font-weight: 400; margin-top: 8px;
  }
  .hero .post-count {
    display: inline-block;
    font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 1.5px; color: var(--blue);
    margin-top: 20px;
  }

  .container { max-width: 960px; margin: 0 auto; padding: 0 24px; }

  /* Summary Strip */
  .summary-section { padding: 48px 0 40px; }
  .summary-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .summary-card {
    background: var(--white);
    padding: 28px 20px;
    text-align: center;
  }
  .summary-card .value {
    font-size: 32px; font-weight: 800; color: var(--anthrazit);
    letter-spacing: -0.5px;
  }
  .summary-card .label {
    font-size: 10px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 2px; color: var(--grau); margin-top: 4px;
  }
  .summary-card.highlight .value { color: var(--blue-dark); }

  /* Section Divider */
  .section-header {
    display: flex; align-items: center; gap: 16px;
    margin-bottom: 24px; padding-bottom: 12px;
    border-bottom: 2px solid var(--black);
  }
  .section-header h2 {
    font-size: 14px; font-weight: 800; text-transform: uppercase;
    letter-spacing: 2px; color: var(--anthrazit);
  }

  /* Post Card */
  .post-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 24px;
    overflow: hidden;
    transition: box-shadow 0.2s;
  }
  .post-card:hover { box-shadow: var(--shadow-lg); }

  .post-card-top {
    display: flex; gap: 0;
  }

  /* Thumbnail */
  .post-thumb {
    width: 200px; min-height: 200px;
    background: var(--hellgrau);
    flex-shrink: 0;
    position: relative;
    overflow: hidden;
  }
  .post-thumb img {
    width: 100%; height: 100%;
    object-fit: cover; display: block;
  }
  .post-thumb .platform-tag {
    position: absolute; top: 12px; left: 12px;
    font-size: 10px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.8px; padding: 4px 10px; border-radius: 4px;
    color: var(--white); background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
  }

  .post-info {
    flex: 1; padding: 24px;
    display: flex; flex-direction: column;
  }
  .post-meta {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 20px;
  }
  .post-type {
    font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 1px; padding: 4px 10px; border-radius: 4px;
    background: var(--blue-light); color: var(--blue-dark);
  }
  .post-date {
    font-size: 12px; color: var(--grau); font-weight: 500;
    margin-left: auto;
  }

  /* Metrics Grid inside post */
  .metrics-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    flex: 1;
  }
  .metric {
    padding: 12px 8px;
    text-align: center;
    border-radius: var(--radius-xs);
    background: var(--hellgrau);
  }
  .metric .num {
    font-size: 20px; font-weight: 800; color: var(--anthrazit);
    letter-spacing: -0.3px;
  }
  .metric .lbl {
    font-size: 9px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 1.2px; color: var(--grau); margin-top: 2px;
  }
  .metric.highlight {
    background: var(--black);
  }
  .metric.highlight .num { color: var(--white); }
  .metric.highlight .lbl { color: var(--grau); }

  .post-card-footer {
    padding: 14px 24px;
    border-top: 1px solid var(--border);
    display: flex; align-items: center; justify-content: flex-end;
  }
  .post-link {
    font-size: 12px; color: var(--blue-dark); text-decoration: none;
    font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
    display: inline-flex; align-items: center; gap: 6px;
    transition: gap 0.2s;
  }
  .post-link:hover { gap: 10px; }

  /* Loading / Error */
  .loading, .error-msg { text-align: center; padding: 80px 20px; }
  .loading .spinner {
    width: 40px; height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--blue);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 20px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Footer */
  .report-footer {
    text-align: center; padding: 48px 0 56px;
    font-size: 11px; color: var(--grau); font-weight: 500;
    letter-spacing: 0.5px;
  }
  .report-footer a {
    color: var(--anthrazit); text-decoration: none; font-weight: 700;
  }
  .report-footer a:hover { color: var(--blue-dark); }
  .report-footer .footer-line {
    width: 40px; height: 2px; background: var(--border);
    margin: 0 auto 16px;
  }

  @media (max-width: 768px) {
    .summary-grid { grid-template-columns: repeat(2, 1fr); }
    .metrics-grid { grid-template-columns: repeat(2, 1fr); }
    .post-card-top { flex-direction: column; }
    .post-thumb { width: 100%; min-height: 180px; max-height: 240px; }
    .hero h1 { font-size: 22px; }
    .hero { padding: 36px 20px 48px; }
  }
  @media (max-width: 480px) {
    .summary-grid { grid-template-columns: repeat(2, 1fr); }
    .summary-card { padding: 20px 12px; }
    .summary-card .value { font-size: 24px; }
    .post-info { padding: 16px; }
    .metric .num { font-size: 16px; }
  }
</style>
</head>
<body>

<!-- Hero -->
<div class="hero">
  <div class="hero-content">
    <img src="logo-dark.svg" alt="#hamburg" onerror="this.src='logo.svg'">
    <h1 id="reportTitle">Campaign Report</h1>
    <div class="subtitle" id="reportSubtitle"></div>
    <div class="post-count" id="postCount" style="display:none;"></div>
  </div>
</div>

<div class="container">
  <!-- Loading -->
  <div class="loading" id="loadingState">
    <div class="spinner"></div>
    <div style="color: var(--grau); font-size: 13px; font-weight: 500;">Insights werden geladen...</div>
  </div>

  <!-- Error -->
  <div class="error-msg" id="errorState" style="display:none;">
    <h2 style="font-size:18px; font-weight:800; margin-bottom:8px;">Report nicht gefunden</h2>
    <p style="color: var(--grau); font-size: 13px;">Dieser Link ist nicht mehr aktiv.</p>
  </div>

  <!-- Summary -->
  <div class="summary-section" id="summarySection" style="display:none;">
    <div class="summary-grid" id="summaryGrid"></div>
  </div>

  <!-- Posts -->
  <div id="postsSection" style="display:none;"></div>

  <div class="report-footer">
    <div class="footer-line"></div>
    <a href="https://hashtaghamburg.de" target="_blank">#hamburg</a> &middot; Performance Report
  </div>
</div>

<script>
(async function() {
  const params = new URLSearchParams(window.location.search);
  const token = params.get('t');
  if (!token) { showError(); return; }

  try {
    const configRes = await fetch('/api/reports?t=' + token);
    if (!configRes.ok) { showError(); return; }
    const configData = await configRes.json();
    if (!configData.success) { showError(); return; }

    const report = configData.data;

    // Fix encoding: replace garbled em-dash/en-dash with proper dash
    const title = (report.clientName || 'Campaign Report')
      .replace(/\u00e2\u20ac./g, ' - ')
      .replace(/Ã¢â¬./g, ' - ')
      .replace(/\s{2,}/g, ' ')
      .trim();

    document.getElementById('reportTitle').textContent = title;
    document.title = title + ' - #hamburg Report';

    const created = new Date(report.createdAt);
    document.getElementById('reportSubtitle').textContent =
      created.toLocaleDateString('de-DE', { day: '2-digit', month: 'long', year: 'numeric' });

    const pc = document.getElementById('postCount');
    pc.style.display = 'inline-block';
    pc.textContent = report.posts.length + (report.posts.length === 1 ? ' Post' : ' Posts');

    // Fetch insights
    const results = [];
    for (const post of report.posts) {
      try {
        if (post.platform === 'instagram') {
          const res = await fetch('/api/insights', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(post.mediaId ? { mediaId: post.mediaId } : { url: post.url }),
          });
          const json = await res.json();
          const d = json.data || json;
          results.push({ ...d, _url: post.url, _platform: post.platform });
        } else {
          results.push({ platform: 'tiktok', type: 'Video', insights: {}, _url: post.url, _platform: 'tiktok' });
        }
      } catch (e) {
        results.push({ error: e.message, _url: post.url, _platform: post.platform });
      }
    }

    renderSummary(results);
    renderPosts(results);

    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('summarySection').style.display = 'block';
    document.getElementById('postsSection').style.display = 'block';

  } catch (e) {
    console.error(e);
    showError();
  }
})();

function showError() {
  document.getElementById('loadingState').style.display = 'none';
  document.getElementById('errorState').style.display = 'block';
}

function fmt(n) {
  if (n === null || n === undefined) return '\u2014';
  if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
  if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
  return n.toLocaleString('de-DE');
}

function renderSummary(results) {
  const grid = document.getElementById('summaryGrid');
  const valid = results.filter(function(r) { return r.insights; });

  var totals = { reach: 0, likes: 0, comments: 0, shares: 0, saves: 0, interactions: 0 };
  for (var j = 0; j < valid.length; j++) {
    var i = valid[j].insights || {};
    totals.reach += i.reach || 0;
    totals.likes += i.likes || 0;
    totals.comments += i.comments || 0;
    totals.shares += i.shares || 0;
    totals.saves += i.saves || 0;
    totals.interactions += i.totalInteractions || 0;
  }

  var items = [
    { v: fmt(totals.reach), l: 'Reichweite', hl: true },
    { v: fmt(totals.interactions || (totals.likes+totals.comments+totals.shares+totals.saves)), l: 'Interaktionen' },
    { v: fmt(totals.likes), l: 'Likes' },
    { v: fmt(totals.comments), l: 'Kommentare' },
    { v: fmt(totals.shares), l: 'Shares' },
    { v: fmt(totals.saves), l: 'Saves' },
  ];

  grid.innerHTML = items.map(function(m) {
    return '<div class="summary-card' + (m.hl ? ' highlight' : '') + '">' +
      '<div class="value">' + m.v + '</div>' +
      '<div class="label">' + m.l + '</div></div>';
  }).join('');
}

function renderPosts(results) {
  var section = document.getElementById('postsSection');
  var html = '<div class="section-header"><h2>Post Details</h2></div>';

  for (var idx = 0; idx < results.length; idx++) {
    var r = results[idx];
    if (r.error) {
      html += '<div class="post-card"><div class="post-info" style="padding:24px;color:var(--grau);">Fehler: ' + r.error + '</div></div>';
      continue;
    }

    var i = r.insights || {};
    var platform = r._platform || r.platform || 'instagram';
    var postDate = r.date ? new Date(r.date).toLocaleDateString('de-DE', { day: '2-digit', month: 'long', year: 'numeric' }) : '';
    var thumb = r.thumbnailUrl || '';

    var metrics = [
      { n: fmt(i.reach), l: 'Reichweite', hl: true },
      { n: fmt(i.likes), l: 'Likes' },
      { n: fmt(i.comments), l: 'Kommentare' },
      { n: fmt(i.shares), l: 'Shares' },
      { n: fmt(i.saves), l: 'Saves' },
      { n: fmt(i.totalInteractions), l: 'Gesamt' },
    ];

    if (i.avgWatchTime) {
      metrics.push({ n: (i.avgWatchTime / 1000).toFixed(1) + 's', l: 'Avg. Watch' });
    }
    if (i.totalWatchTime) {
      metrics.push({ n: (i.totalWatchTime / 1000 / 3600).toFixed(1) + 'h', l: 'Watch Time' });
    }

    var metricsHTML = metrics.map(function(m) {
      return '<div class="metric' + (m.hl ? ' highlight' : '') + '">' +
        '<div class="num">' + m.n + '</div>' +
        '<div class="lbl">' + m.l + '</div></div>';
    }).join('');

    html += '<div class="post-card"><div class="post-card-top">';

    // Thumbnail
    if (thumb) {
      html += '<div class="post-thumb">' +
        '<img src="' + thumb + '" alt="" loading="lazy">' +
        '<span class="platform-tag">' + platform + '</span></div>';
    }

    html += '<div class="post-info">' +
      '<div class="post-meta">' +
        '<span class="post-type">' + (r.type || 'Post') + '</span>' +
        '<span class="post-date">' + postDate + '</span>' +
      '</div>' +
      '<div class="metrics-grid">' + metricsHTML + '</div>' +
    '</div></div>';

    if (r.permalink) {
      html += '<div class="post-card-footer">' +
        '<a class="post-link" href="' + r.permalink + '" target="_blank">' +
        'Post ansehen <span>\u2192</span></a></div>';
    }

    html += '</div>';
  }

  section.innerHTML = html;
}
</script>
</body>
</html>
