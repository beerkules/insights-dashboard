<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Hashtag Hamburg — Campaign Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="logo.svg">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #111111;
    --bg-card: #1a1a1a;
    --bg-input: #1e1e1e;
    --blue: #38B6FF;
    --blue-dark: #1A8FCC;
    --blue-glow: rgba(56, 182, 255, 0.25);
    --green: #34D399;
    --pink: #F472B6;
    --text: #ffffff;
    --text-sec: #aaaaaa;
    --text-muted: #555555;
    --border: rgba(255, 255, 255, 0.08);
    --border-light: rgba(255, 255, 255, 0.12);
    --radius: 16px;
    --radius-sm: 10px;
    --radius-xs: 6px;
    --nav-scrolled: rgba(17, 17, 17, 0.9);
    --media-bg: #0d0d0d;
    --tooltip-bg: #222;
    --badge-bg: rgba(0, 0, 0, 0.7);
  }

  html.light {
    --bg: #f5f5f7;
    --bg-card: #ffffff;
    --bg-input: #f0f0f2;
    --blue: #1A8FCC;
    --blue-dark: #1574A8;
    --blue-glow: rgba(26, 143, 204, 0.2);
    --green: #16a34a;
    --pink: #db2777;
    --text: #111111;
    --text-sec: #555555;
    --text-muted: #999999;
    --border: rgba(0, 0, 0, 0.08);
    --border-light: rgba(0, 0, 0, 0.12);
    --nav-scrolled: rgba(245, 245, 247, 0.9);
    --media-bg: #e5e5e5;
    --tooltip-bg: #ffffff;
    --badge-bg: rgba(255, 255, 255, 0.85);
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  .dashboard {
    background:
      radial-gradient(ellipse at 20% 0%, rgba(56, 182, 255, 0.06) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 30%, rgba(56, 182, 255, 0.04) 0%, transparent 50%),
      radial-gradient(ellipse at 40% 80%, rgba(56, 182, 255, 0.03) 0%, transparent 60%),
      var(--bg);
  }

  html.light .dashboard {
    background:
      radial-gradient(ellipse at 20% 0%, rgba(26, 143, 204, 0.06) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 30%, rgba(26, 143, 204, 0.04) 0%, transparent 50%),
      var(--bg);
  }

  html.light .login-screen {
    background:
      radial-gradient(ellipse at 30% 20%, rgba(26, 143, 204, 0.06) 0%, transparent 50%),
      var(--bg);
  }

  html.light .nav-logo, html.light .footer-logo, html.light .login-logo {
    content: url('logo-dark.svg');
  }

  html.light .login-btn { color: #fff; }
  html.light .login-box { box-shadow: 0 8px 32px rgba(0,0,0,0.08); }
  html.light .post-card { box-shadow: 0 1px 4px rgba(0,0,0,0.04); }
  html.light .summary-card { box-shadow: 0 1px 4px rgba(0,0,0,0.04); }
  html.light .post-type-tag { background: rgba(26, 143, 204, 0.08); }
  html.light .post-type-tag.story { background: rgba(219, 39, 119, 0.08); }
  html.light .post-type-tag.tiktok { background: rgba(22, 163, 74, 0.08); }
  html.light .platform-badge.badge-ig { background: rgba(219, 39, 119, 0.06); border-color: rgba(219, 39, 119, 0.15); }
  html.light .platform-badge.badge-tt { background: rgba(22, 163, 74, 0.06); border-color: rgba(22, 163, 74, 0.15); }
  html.light .engagement-tooltip { box-shadow: 0 8px 24px rgba(0,0,0,0.12); border-color: var(--border); }

  /* ═══ LOGIN SCREEN ═══ */
  .login-screen {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background:
      radial-gradient(ellipse at 30% 20%, rgba(56, 182, 255, 0.07) 0%, transparent 50%),
      radial-gradient(ellipse at 70% 70%, rgba(56, 182, 255, 0.04) 0%, transparent 50%),
      var(--bg);
  }

  .login-box {
    width: 100%;
    max-width: 400px;
    padding: 48px 40px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    text-align: center;
  }

  .login-logo { width: 200px; margin: 0 auto 32px; display: block; }

  .login-title {
    font-size: 14px; font-weight: 600; letter-spacing: 2px;
    text-transform: uppercase; color: var(--text-sec); margin-bottom: 32px;
  }

  .login-input {
    width: 100%; padding: 14px 18px; background: var(--bg-input);
    border: 1px solid var(--border-light); border-radius: var(--radius-sm);
    color: var(--text); font-family: inherit; font-size: 15px; font-weight: 500;
    letter-spacing: 4px; text-align: center; outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .login-input::placeholder { letter-spacing: 1px; color: var(--text-muted); font-weight: 400; }
  .login-input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px var(--blue-glow); }

  .login-btn {
    width: 100%; margin-top: 16px; padding: 14px; background: var(--blue); color: #000;
    border: none; border-radius: var(--radius-sm); font-family: inherit; font-size: 14px;
    font-weight: 700; letter-spacing: 1px; text-transform: uppercase; cursor: pointer;
    transition: background 0.2s, transform 0.1s;
  }

  .login-btn:hover { background: var(--blue-dark); }
  .login-btn:active { transform: scale(0.98); }

  .login-error { margin-top: 16px; color: #F87171; font-size: 13px; font-weight: 500; display: none; }
  .login-error.visible { display: block; }

  .login-help { margin-top: 24px; font-size: 12px; color: var(--text-muted); line-height: 1.5; }
  .login-help a { color: var(--text-sec); text-decoration: none; transition: color 0.2s; }
  .login-help a:hover { color: var(--blue); }

  /* ═══ NAV ═══ */
  .nav {
    position: sticky; top: 0; z-index: 100; height: 60px; padding: 0 32px;
    display: flex; align-items: center; justify-content: space-between;
    background: transparent; border-bottom: 1px solid transparent;
    transition: background 0.3s, border-color 0.3s, backdrop-filter 0.3s;
  }

  .nav.scrolled {
    background: var(--nav-scrolled);
    backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
    border-bottom-color: var(--border);
  }

  .nav-logo { height: 22px; }
  .nav-right { display: flex; align-items: center; gap: 20px; }
  .nav-client { font-size: 13px; font-weight: 500; color: var(--text-sec); }

  .nav-logout {
    font-size: 12px; font-weight: 600; color: var(--text-muted); text-transform: uppercase;
    letter-spacing: 1px; cursor: pointer; transition: color 0.2s; background: none;
    border: none; font-family: inherit;
  }

  .nav-logout:hover { color: var(--text); }

  .theme-toggle {
    background: none; border: 1px solid var(--border); border-radius: var(--radius-xs);
    width: 34px; height: 34px; display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: var(--text-muted); transition: all 0.2s;
  }

  .theme-toggle:hover { border-color: var(--border-light); color: var(--text-sec); }
  .theme-toggle svg { width: 16px; height: 16px; }

  /* ═══ MAIN LAYOUT ═══ */
  .dashboard { display: none; flex-direction: column; min-height: 100vh; }
  .dashboard.active { display: flex; }
  .login-screen.hidden { display: none; }

  .main { max-width: 1200px; width: 100%; margin: 0 auto; padding: 40px 32px 80px; }

  /* ═══ CAMPAIGN HEADER ═══ */
  .campaign-header { margin-bottom: 40px; }

  .campaign-kicker {
    font-size: 11px; font-weight: 700; letter-spacing: 3px;
    text-transform: uppercase; color: var(--blue); margin-bottom: 8px;
  }

  .campaign-title-row {
    display: flex; align-items: baseline; gap: 16px; flex-wrap: wrap; margin-bottom: 8px;
  }

  .campaign-title { font-size: 32px; font-weight: 800; line-height: 1.2; }

  .campaign-title-row .campaign-tabs { margin-top: 0; }

  .campaign-meta { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 12px; align-items: center; }

  .campaign-meta-item {
    display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text-sec);
  }

  .campaign-meta-item svg { width: 16px; height: 16px; opacity: 0.6; }

  /* ═══ CAMPAIGN TABS ═══ */
  .campaign-tabs {
    display: flex; gap: 8px; margin-top: 16px; flex-wrap: wrap;
  }

  .campaign-tab {
    padding: 8px 16px; background: var(--bg-card); border: 1px solid var(--border);
    border-radius: var(--radius-xs); font-family: inherit; font-size: 12px;
    font-weight: 600; color: var(--text-muted); cursor: pointer;
    transition: all 0.2s; letter-spacing: 0.5px;
  }

  .campaign-tab:hover { border-color: var(--border-light); color: var(--text-sec); }

  .campaign-tab.active {
    background: rgba(56, 182, 255, 0.1); border-color: rgba(56, 182, 255, 0.3);
    color: var(--blue);
  }

  /* ═══ PLATFORM SUMMARY ═══ */
  .platform-summary {
    display: flex; gap: 10px; flex-wrap: wrap; margin-top: 12px;
  }

  .platform-badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 5px 12px; border-radius: var(--radius-xs);
    font-size: 11px; font-weight: 600; letter-spacing: 0.5px;
  }

  .platform-badge svg { width: 14px; height: 14px; }

  .platform-badge.badge-ig {
    background: rgba(244, 114, 182, 0.08); color: var(--pink);
    border: 1px solid rgba(244, 114, 182, 0.15);
  }

  .platform-badge.badge-tt {
    background: rgba(52, 211, 153, 0.08); color: var(--green);
    border: 1px solid rgba(52, 211, 153, 0.15);
  }

  /* ═══ SUMMARY CARDS ═══ */
  .summary-wrap { margin-bottom: 48px; }

  .summary-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }

  .summary-card {
    background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 20px 24px; transition: border-color 0.2s; position: relative; overflow: hidden;
  }

  .summary-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0;
    height: 3px; background: var(--blue);
  }

  .summary-card:hover { border-color: var(--border-light); }

  .summary-top { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }

  .summary-icon {
    width: 36px; height: 36px; border-radius: 8px; display: flex;
    align-items: center; justify-content: center; flex-shrink: 0;
    background: rgba(56, 182, 255, 0.12); color: var(--blue);
  }

  .summary-icon svg { width: 18px; height: 18px; }

  .summary-label {
    font-size: 11px; font-weight: 600; letter-spacing: 2px;
    text-transform: uppercase; color: var(--text-muted);
  }

  .summary-value { font-size: 28px; font-weight: 800; line-height: 1; color: var(--text); }

  .summary-value .unit { font-size: 16px; font-weight: 600; color: var(--text-sec); margin-left: 2px; }

  .summary-sub { margin-top: 6px; font-size: 12px; color: var(--text-muted); }

  /* ═══ ENGAGEMENT TOOLTIP ═══ */
  .engagement-info {
    position: relative; display: inline-flex; align-items: center; gap: 6px;
  }

  .engagement-info .info-icon {
    width: 16px; height: 16px; border-radius: 50%; display: inline-flex;
    align-items: center; justify-content: center; background: rgba(255,255,255,0.06);
    color: var(--text-muted); cursor: help; font-size: 10px; font-weight: 700;
    transition: all 0.2s; flex-shrink: 0;
  }

  .engagement-info .info-icon:hover { background: rgba(56, 182, 255, 0.15); color: var(--blue); }

  .engagement-tooltip {
    display: none; position: absolute; bottom: calc(100% + 10px); left: 50%;
    transform: translateX(-50%); width: 240px; padding: 14px 16px;
    background: var(--tooltip-bg); border: 1px solid var(--border-light); border-radius: var(--radius-xs);
    font-size: 11px; line-height: 1.6; color: var(--text-sec); z-index: 10;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }

  .engagement-tooltip::after {
    content: ''; position: absolute; top: 100%; left: 50%; transform: translateX(-50%);
    border: 6px solid transparent; border-top-color: var(--tooltip-bg);
  }

  .engagement-info:hover .engagement-tooltip { display: block; }

  .tooltip-formula {
    display: block; margin-top: 6px; padding: 6px 8px; background: rgba(56,182,255,0.08);
    border-radius: 4px; font-family: monospace; font-size: 11px; color: var(--blue);
  }

  /* ═══ SECTION TITLES ═══ */
  .section-title {
    font-size: 11px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase;
    color: var(--text-muted); margin-bottom: 20px; padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }

  /* ═══ POST CARDS ═══ */
  .posts-list { display: flex; flex-direction: column; gap: 24px; }

  .post-card {
    background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
    overflow: hidden; transition: border-color 0.3s, transform 0.3s, box-shadow 0.3s;
    display: grid; grid-template-columns: auto 1fr auto;
  }

  .post-card:hover {
    border-color: var(--border-light); transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
  }

  /* Media column */
  .post-media {
    position: relative; background: var(--media-bg); overflow: hidden;
  }

  .post-card.square .post-media { width: 320px; }
  .post-card.portrait .post-media { width: 240px; aspect-ratio: 9 / 16; }

  .post-media img { width: 100%; height: 100%; object-fit: cover; display: block; }

  .post-media-badge {
    position: absolute; top: 12px; left: 12px; display: flex; align-items: center;
    gap: 6px; padding: 5px 10px; background: var(--badge-bg); backdrop-filter: blur(8px);
    border-radius: var(--radius-xs); font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 1px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }

  .badge-instagram { color: var(--pink); }
  .badge-tiktok { color: var(--green); }
  .post-media-badge svg { width: 14px; height: 14px; }

  /* Info column (caption) */
  .post-info {
    padding: 24px 28px; display: flex; flex-direction: column; min-width: 0;
  }

  .post-type-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; flex-wrap: wrap; }

  .post-type-tag {
    display: inline-flex; align-items: center; gap: 5px; font-size: 10px; font-weight: 700;
    letter-spacing: 2px; text-transform: uppercase; padding: 4px 10px; border-radius: 4px;
    background: rgba(56, 182, 255, 0.1); color: var(--blue);
  }

  .post-type-tag svg { width: 12px; height: 12px; }
  .post-type-tag.story { background: rgba(244, 114, 182, 0.1); color: var(--pink); }
  .post-type-tag.tiktok { background: rgba(52, 211, 153, 0.1); color: var(--green); }

  .post-date { font-size: 12px; color: var(--text-muted); }

  .post-caption {
    font-size: 13px; color: var(--text-sec); line-height: 1.6; margin: 10px 0 6px;
    display: -webkit-box; -webkit-line-clamp: 6; -webkit-box-orient: vertical;
    overflow: hidden; transition: all 0.3s; flex: 1;
  }

  .post-caption.expanded { -webkit-line-clamp: unset; display: block; }

  .caption-toggle {
    background: none; border: none; font-family: inherit; font-size: 12px;
    font-weight: 600; color: var(--text-muted); cursor: pointer; padding: 0;
    margin-bottom: 8px; transition: color 0.2s;
  }

  .caption-toggle:hover { color: var(--text-sec); }

  .post-link {
    display: inline-flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 600;
    color: var(--blue); text-decoration: none; transition: opacity 0.2s; margin-left: auto;
  }

  .post-link:hover { opacity: 0.7; }
  .post-link svg { width: 14px; height: 14px; }

  /* Metrics column */
  .metrics-col {
    display: flex; flex-direction: column; width: 280px;
    border-left: 1px solid var(--border);
  }

  .metric {
    padding: 10px 20px; display: flex; align-items: center;
    justify-content: space-between; gap: 8px;
    border-bottom: 1px solid var(--border);
  }

  .metric:last-child { border-bottom: none; }

  .metric:first-child {
    padding: 16px 20px;
    background: rgba(56, 182, 255, 0.04);
  }

  .metric:first-child .metric-value { font-size: 22px; }

  .metric-label {
    display: flex; align-items: center; gap: 5px;
    font-size: 9px; font-weight: 600; letter-spacing: 1.5px;
    text-transform: uppercase; color: var(--text-muted);
  }

  .metric-label svg { width: 11px; height: 11px; opacity: 0.5; }

  .metric-value { font-size: 15px; font-weight: 700; color: var(--text); white-space: nowrap; }
  .metric-value.accent { color: var(--blue); }

  .metric-value .metric-unit {
    font-size: 10px; font-weight: 500; color: var(--text-sec); margin-left: 2px;
  }

  /* ═══ FOOTER ═══ */
  .footer {
    text-align: center; padding: 40px 32px; font-size: 12px;
    color: var(--text-muted); border-top: 1px solid var(--border);
  }

  .footer-logo { height: 18px; opacity: 0.3; margin-bottom: 12px; }

  .footer a { color: var(--text-muted); text-decoration: none; transition: color 0.2s; }
  .footer a:hover { color: var(--text-sec); }

  /* ═══ RESPONSIVE ═══ */
  @media (max-width: 768px) {
    .nav { padding: 0 20px; }
    .main { padding: 24px 16px 60px; }
    .campaign-title { font-size: 24px; }
    .summary-grid { grid-template-columns: 1fr; gap: 10px; }
    .summary-card { padding: 16px; }
    .summary-value { font-size: 22px; }
    .post-card { grid-template-columns: 1fr; }
    .post-media { width: 100% !important; height: 300px; aspect-ratio: auto !important; }
    .post-card.square .post-media { height: auto; aspect-ratio: 1 / 1 !important; max-height: 400px; }
    .post-card.portrait .post-media { height: 400px; }
    .post-info { padding: 20px; border-right: none; }
    .metrics-col { width: 100%; flex-direction: row; flex-wrap: wrap; border-left: none; border-top: 1px solid var(--border); }
    .metric { width: 50%; border-bottom: 1px solid var(--border); }
    .login-box { margin: 20px; padding: 36px 24px; }
  }

  @media (max-width: 390px) {
    .metrics-grid { grid-template-columns: 1fr 1fr; }
  }

  /* ═══ ANIMATIONS ═══ */
  @keyframes revealUp {
    from { opacity: 0; transform: translateY(24px); filter: blur(4px); }
    to { opacity: 1; transform: translateY(0); filter: blur(0); }
  }

  @keyframes revealScale {
    from { opacity: 0; transform: scale(0.96) translateY(12px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  @keyframes revealMetric {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }


  .animate-in {
    animation: revealUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    opacity: 0;
  }

  .post-card {
    opacity: 0;
    transform: translateY(24px) scale(0.98);
    filter: blur(2px);
    transition: opacity 0.6s cubic-bezier(0.22, 1, 0.36, 1),
                transform 0.6s cubic-bezier(0.22, 1, 0.36, 1),
                filter 0.6s cubic-bezier(0.22, 1, 0.36, 1);
  }

  .post-card.visible {
    opacity: 1;
    transform: translateY(0) scale(1);
    filter: blur(0);
  }

  .post-card .metric {
    opacity: 0;
    transform: translateY(8px);
  }

  .post-card.visible .metric {
    animation: revealMetric 0.4s cubic-bezier(0.22, 1, 0.36, 1) forwards;
  }

  .post-card.visible .metric:nth-child(1) { animation-delay: 0.15s; }
  .post-card.visible .metric:nth-child(2) { animation-delay: 0.2s; }
  .post-card.visible .metric:nth-child(3) { animation-delay: 0.25s; }
  .post-card.visible .metric:nth-child(4) { animation-delay: 0.3s; }
  .post-card.visible .metric:nth-child(5) { animation-delay: 0.35s; }
  .post-card.visible .metric:nth-child(6) { animation-delay: 0.4s; }
  .post-card.visible .metric:nth-child(7) { animation-delay: 0.45s; }
  .post-card.visible .metric:nth-child(8) { animation-delay: 0.5s; }

  .summary-card {
    opacity: 0;
    transform: translateY(16px) scale(0.97);
  }

  .summary-card.visible {
    animation: revealScale 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards;
  }

  .summary-card.visible:nth-child(1) { animation-delay: 0.05s; }
  .summary-card.visible:nth-child(2) { animation-delay: 0.15s; }
  .summary-card.visible:nth-child(3) { animation-delay: 0.25s; }


  /* ═══ PDF EXPORT ═══ */
  .export-btn {
    display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px;
    background: rgba(56, 182, 255, 0.1); border: 1px solid rgba(56, 182, 255, 0.2);
    border-radius: var(--radius-xs); font-family: inherit; font-size: 12px;
    font-weight: 600; color: var(--blue); cursor: pointer; transition: all 0.2s;
    letter-spacing: 0.5px;
  }

  .export-btn:hover {
    background: rgba(56, 182, 255, 0.15); border-color: rgba(56, 182, 255, 0.4);
  }

  .export-btn svg { width: 14px; height: 14px; }

  /* ═══ PRINT STYLES ═══ */
  @media print {

//  HELPERS
// ═══════════════════════════════════════════════════════════════

function fmt(n) {
  if (n == null) return '—';
  if (n >= 1000000) return (n / 1000000).toFixed(1).replace('.', ',') + 'M';
  if (n >= 10000) return (n / 1000).toFixed(1).replace('.', ',') + 'K';
  return n.toLocaleString('de-DE');
}

function fmtDate(d) {
  return new Date(d).toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit', year: 'numeric' });
}

function daysAgo(d) {
  const now = new Date();
  const then = new Date(d);
  const diff = Math.floor((now - then) / (1000 * 60 * 60 * 24));
  if (diff === 0) return 'heute';
  if (diff === 1) return 'gestern';
  return `vor ${diff} Tagen`;
}

let currentClient = null;

// ═══════════════════════════════════════════════════════════════
//  THEME
// ═══════════════════════════════════════════════════════════════

function applyTheme(theme) {
  document.documentElement.classList.toggle('light', theme === 'light');
  document.getElementById('themeIconSun').style.display = theme === 'dark' ? '' : 'none';
  document.getElementById('themeIconMoon').style.display = theme === 'light' ? '' : 'none';
}

function toggleTheme() {
  const isLight = document.documentElement.classList.contains('light');
  const next = isLight ? 'dark' : 'light';
  localStorage.setItem('hh-theme', next);
  applyTheme(next);
}

// Init theme
applyTheme(localStorage.getItem('hh-theme') || 'light');

function getClients() {
  const raw = localStorage.getItem('hh-dashboard-clients');
  const stored = raw ? JSON.parse(raw) : {};
  return Object.keys(stored).length > 0 ? stored : CLIENTS;
}

function handleLogin(e) {
  e.preventDefault();
  const code = document.getElementById('loginCode').value.trim().toUpperCase();
  const allClients = getClients();
  currentClient = allClients[code];

  if (currentClient) {
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('dashboard').classList.add('active');
    renderDashboard(currentClient, 0);
  } else {
    document.getElementById('loginError').classList.add('visible');
    document.getElementById('loginCode').focus();
    setTimeout(() => document.getElementById('loginError').classList.remove('visible'), 3000);
  }
  return false;
}

function logout() {
  document.getElementById('dashboard').classList.remove('active');
  document.getElementById('loginScreen').classList.remove('hidden');
  document.getElementById('loginCode').value = '';
  document.getElementById('mainContent').innerHTML = '';
  currentClient = null;
}

function switchCampaign(idx) {
  if (currentClient) renderDashboard(currentClient, idx);
}

// ═══════════════════════════════════════════════════════════════
//  RENDER DASHBOARD

function renderDashboard(client, campaignIdx) {
  const main = document.getElementById('mainContent');

  if (!client.campaigns || client.campaigns.length === 0 || !(client.campaigns[campaignIdx]?.posts?.length)) {
    main.innerHTML = `
      <div class="campaign-header animate-in">
        <div class="campaign-kicker">Kampagnen-Report</div>
        <h1 class="campaign-title">${client.name}</h1>
      </div>
      <div class="animate-in" style="animation-delay:0.1s;text-align:center;padding:60px 24px;">
        <div style="width:64px;height:64px;margin:0 auto 20px;border-radius:50%;background:rgba(56,182,255,0.08);display:flex;align-items:center;justify-content:center;">
          <svg viewBox="0 0 24 24" fill="none" stroke="var(--blue)" stroke-width="1.5" style="width:28px;height:28px;"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        </div>
        <h2 style="font-size:20px;font-weight:700;margin-bottom:8px;">Deine Kampagne wird vorbereitet</h2>
        <p style="color:var(--text-sec);font-size:14px;max-width:420px;margin:0 auto 24px;line-height:1.7;">
          Wir arbeiten gerade an deinem Kampagnen-Report. Sobald die ersten Posts live sind, findest du hier alle Insights — Views, Reach, Engagement und mehr.
        </p>
        <p style="color:var(--text-muted);font-size:13px;">
          Fragen? Schreib uns an <a href="mailto:moin@hashtaghamburg.de" style="color:var(--blue);text-decoration:none;">moin@hashtaghamburg.de</a>
        </p>
      </div>
    `;
    return;
  }

  const campaign = client.campaigns[campaignIdx];
  if (!campaign) return;

  // Sort posts by date descending (newest first)
  const posts = [...(campaign.posts || [])].sort((a, b) => new Date(b.date) - new Date(a.date));

  // Totals
  const totalViews = posts.reduce((s, p) => s + (p.insights.views || 0), 0);
  const totalLikes = posts.reduce((s, p) => s + (p.insights.likes || 0), 0);
  const totalComments = posts.reduce((s, p) => s + (p.insights.comments || 0), 0);
  const totalShares = posts.reduce((s, p) => s + (p.insights.shares || 0), 0);
  const totalSaves = posts.reduce((s, p) => s + (p.insights.saves || 0), 0);
  const totalInteractions = totalLikes + totalComments + totalShares + totalSaves;
  const totalReach = posts.reduce((s, p) => s + (p.insights.reach || 0), 0);
  const avgEngagement = totalReach > 0 ? ((totalInteractions / totalReach) * 100).toFixed(2) : 0;

  const campaignTitle = client.name;

  const now = new Date();
  const end = new Date(campaign.endDate);
  const isFinished = now > end;

  // Platform counts
  const igCount = posts.filter(p => p.platform === 'instagram').length;
  const ttCount = posts.filter(p => p.platform === 'tiktok').length;

  // Campaign tabs
  let tabsHTML = '';
  if (client.campaigns.length > 1) {
    tabsHTML = `<div class="campaign-tabs">${client.campaigns.map((c, i) =>
      `<button class="campaign-tab${i === campaignIdx ? ' active' : ''}" onclick="switchCampaign(${i})">${c.label}</button>`
    ).join('')}</div>`;
  }

  // Status color
  let statusColor = 'var(--text-muted)';
  let statusLabel = campaign.status;
  if (campaign.status === 'Aktiv') { statusColor = 'var(--green)'; }
  else if (campaign.status === 'Geplant') { statusColor = 'var(--blue)'; }
  if (isFinished && campaign.status !== 'Geplant') { statusLabel = 'Abgeschlossen'; statusColor = 'var(--text-muted)'; }

  main.innerHTML = `
    <div class="campaign-header animate-in">
      <div class="campaign-kicker">Kampagnen-Report</div>
      <div class="campaign-title-row">
        <h1 class="campaign-title">${campaignTitle}</h1>
        ${tabsHTML}
      </div>
      <div class="campaign-meta">
        <div class="campaign-meta-item">${ICONS.calendar} ${fmtDate(campaign.startDate)} — ${fmtDate(campaign.endDate)}</div>
        <div class="campaign-meta-item">${ICONS.doc} ${posts.length} Posts</div>
        ${igCount > 0 ? `<span class="platform-badge badge-ig">${ICONS.instagram} ${igCount}x Instagram</span>` : ''}
        ${ttCount > 0 ? `<span class="platform-badge badge-tt">${ICONS.tiktok} ${ttCount}x TikTok</span>` : ''}
        <button class="export-btn" onclick="window.print()">${ICONS.download} Als PDF speichern</button>
      </div>
    </div>

    <div class="summary-wrap animate-in" style="animation-delay: 0.1s;">
      <div class="summary-grid">
        <div class="summary-card">
          <div class="summary-top"><div class="summary-icon">${ICONS.eye}</div><div class="summary-label">Total Views</div></div>
          <div class="summary-value">${fmt(totalViews)}</div>
          <div class="summary-sub">Views across all posts</div>
        </div>
        <div class="summary-card">
          <div class="summary-top"><div class="summary-icon">${ICONS.heart}</div><div class="summary-label">Interactions</div></div>
          <div class="summary-value">${fmt(totalInteractions)}</div>
          <div class="summary-sub">Likes, Comments, Shares, Saves</div>
        </div>
        <div class="summary-card">
          <div class="summary-top">
            <div class="summary-icon">${ICONS.percent}</div>
            <div class="engagement-info">
              <div class="summary-label">Engagement Rate</div>
              <span class="info-icon">?</span>
              <div class="engagement-tooltip">
                Anteil der Nutzer, die mit dem Content interagiert haben, gemessen am Reach.
                <span class="tooltip-formula">(Likes + Comments + Shares + Saves) / Reach</span>
              </div>
            </div>
          </div>
          <div class="summary-value">${avgEngagement}<span class="unit">%</span></div>
          <div class="summary-sub">Interactions / Reach</div>
        </div>
      </div>
    </div>

    <div class="section-title">Einzelne Posts</div>
    <div class="posts-list">${posts.map((p, i) => renderPostCard(p, i)).join('')}</div>
  `;
}

// ═══════════════════════════════════════════════════════════════
//  RENDER POST CARD
// ═══════════════════════════════════════════════════════════════

function renderPostCard(post, index) {
  const badgeClass = post.platform === 'instagram' ? 'badge-instagram' : 'badge-tiktok';
  const typeClass = post.typeKey === 'story' ? 'story' : post.typeKey === 'tiktok' ? 'tiktok' : '';
  const ins = post.insights;
  const isPortrait = post.typeKey === 'story' || post.typeKey === 'reel' || post.typeKey === 'tiktok';
  const isSquare = post.typeKey === 'foto';
  const layoutClass = isSquare ? ' square' : isPortrait ? ' portrait' : '';
  const platformLabel = post.platform === 'instagram' ? 'Instagram' : 'TikTok';
  const pIcon = post.platform === 'instagram' ? ICONS.instagram : ICONS.tiktok;
  const pIconSmall = pIcon;

  let linkHTML = '';
  if (post.permalink) {
    const label = post.platform === 'tiktok' ? 'Auf TikTok ansehen' : 'Auf Instagram ansehen';
    linkHTML = `<a href="${post.permalink}" target="_blank" rel="noopener" class="post-link">${ICONS.link} ${label}</a>`;
  }

  // Metric helper
  function m(icon, label, value, accent) {
    return `<div class="metric"><div class="metric-label">${icon} ${label}</div><div class="metric-value${accent ? ' accent' : ''}">${value}</div></div>`;
  }

  let metricsHTML = '';

  if (post.typeKey === 'foto') {
    metricsHTML = m(ICONS.eye, 'Views', fmt(ins.views), true)
      + m(ICONS.reach, 'Reach', fmt(ins.reach))
      + m(ICONS.percent, 'Engagement', ins.engagementRate + '<span class="metric-unit">%</span>', true)
      + m(ICONS.heart, 'Likes', fmt(ins.likes))
      + m(ICONS.comment, 'Comments', fmt(ins.comments))
      + m(ICONS.bookmark, 'Saves', fmt(ins.saves))
      + m(ICONS.share, 'Shares', fmt(ins.shares))
      + m(ICONS.user, 'Profile Visits', fmt(ins.profileVisits));
  } else if (post.typeKey === 'reel') {
    metricsHTML = m(ICONS.eye, 'Views', fmt(ins.views), true)
      + m(ICONS.reach, 'Reach', fmt(ins.reach))
      + m(ICONS.percent, 'Engagement', ins.engagementRate + '<span class="metric-unit">%</span>', true)
      + m(ICONS.heart, 'Likes', fmt(ins.likes))
      + m(ICONS.comment, 'Comments', fmt(ins.comments))
      + m(ICONS.bookmark, 'Saves', fmt(ins.saves))
      + m(ICONS.share, 'Shares', fmt(ins.shares))
      + m(ICONS.clock, 'Avg. Watch Time', ins.avgWatchTime + '<span class="metric-unit">s</span>');
  } else if (post.typeKey === 'story') {
    metricsHTML = m(ICONS.eye, 'Views', fmt(ins.views), true)
      + m(ICONS.reach, 'Reach', fmt(ins.reach))
      + m(ICONS.click, 'Link Clicks', fmt(ins.linkClicks), true)
      + m(ICONS.tapFwd, 'Tap Forward', fmt(ins.tapForward))
      + m(ICONS.tapBack, 'Tap Back', fmt(ins.tapBack))
      + m(ICONS.exit, 'Exits', fmt(ins.tapExit))
      + m(ICONS.share, 'Shares', fmt(ins.shares))
      + m(ICONS.user, 'Profile Visits', fmt(ins.profileVisits));
  } else if (post.typeKey === 'tiktok') {
    metricsHTML = m(ICONS.eye, 'Views', fmt(ins.views), true)
      + m(ICONS.reach, 'Reach', fmt(ins.reach))
      + m(ICONS.play, 'Full Watch Rate', ins.fullVideoWatchedRate + '<span class="metric-unit">%</span>', true)
      + m(ICONS.heart, 'Likes', fmt(ins.likes))
      + m(ICONS.comment, 'Comments', fmt(ins.comments))
      + m(ICONS.bookmark, 'Saves', fmt(ins.saves))
      + m(ICONS.share, 'Shares', fmt(ins.shares))
      + m(ICONS.clock, 'Avg. Watch Time', ins.avgWatchTime + '<span class="metric-unit">s</span>');
  }

  const captionId = `caption-${post.id}`;

  const cardClass = isSquare ? 'square' : isPortrait ? 'portrait' : '';

  return `
    <div class="post-card ${cardClass}">
      <div class="post-media">
        <img src="${post.mediaUrl}" alt="${post.type}" loading="lazy">
        <div class="post-media-badge ${badgeClass}">${pIcon} ${platformLabel}</div>
      </div>
      <div class="post-info">
        <div class="post-type-row">
          <span class="post-type-tag ${typeClass}">${pIconSmall} ${post.type}</span>
          <span class="post-date">${fmtDate(post.date)} · ${daysAgo(post.date)}</span>
          ${linkHTML}
        </div>
        <p class="post-caption" id="${captionId}">${post.caption}</p>
        <button class="caption-toggle" onclick="toggleCaption('${captionId}', this)">mehr anzeigen</button>
      </div>
      <div class="metrics-col">${metricsHTML}</div>
    </div>
  `;
}

// ═══════════════════════════════════════════════════════════════
//  CAPTION TOGGLE
// ═══════════════════════════════════════════════════════════════

function toggleCaption(id, btn) {
  const el = document.getElementById(id);
  el.classList.toggle('expanded');
  btn.textContent = el.classList.contains('expanded') ? 'weniger anzeigen' : 'mehr anzeigen';
}

function hideTruncateButtons() {
  document.querySelectorAll('.post-caption').forEach(el => {
    const isOverflowing = el.scrollHeight > el.clientHeight + 1;
    const btn = el.nextElementSibling;
    if (btn && btn.classList.contains('caption-toggle')) {
      btn.style.display = isOverflowing ? '' : 'none';
    }
  });
}

// ═══════════════════════════════════════════════════════════════
//  SCROLL REVEAL (Intersection Observer)
// ═══════════════════════════════════════════════════════════════

const observer = new IntersectionObserver((entries) => {
  entries.forEach((entry, i) => {
    if (entry.isIntersecting) {
      // Stagger cards based on their position in the list
      const el = entry.target;
      const siblings = [...el.parentElement.children];
      const idx = siblings.indexOf(el);
      el.style.transitionDelay = `${idx * 0.1}s`;
      el.classList.add('visible');
      observer.unobserve(el);
    }
  });
}, { threshold: 0.08, rootMargin: '0px 0px -40px 0px' });

// Re-observe after each render
const origRender = renderDashboard;
renderDashboard = function(client, idx) {
  origRender(client, idx);
  document.querySelectorAll('.post-card').forEach(el => observer.observe(el));
  document.querySelectorAll('.summary-card').forEach(el => observer.observe(el));
  requestAnimationFrame(() => hideTruncateButtons());
};

// Nav blur on scroll
window.addEventListener('scroll', () => {
  const nav = document.querySelector('.nav');
  if (nav) nav.classList.toggle('scrolled', window.scrollY > 20);
}, { passive: true });
</script>
