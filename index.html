<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Hashtag Hamburg — Campaign Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #111111;
    --bg-card: #1a1a1a;
    --bg-card-hover: #222222;
    --bg-input: #1e1e1e;
    --blue: #38B6FF;
    --blue-dark: #1A8FCC;
    --blue-light: #D6EEFF;
    --blue-glow: rgba(56, 182, 255, 0.25);
    --green: #34D399;
    --green-glow: rgba(52, 211, 153, 0.2);
    --pink: #F472B6;
    --pink-glow: rgba(244, 114, 182, 0.2);
    --purple: #A78BFA;
    --orange: #FB923C;
    --white: #ffffff;
    --gray: #888888;
    --gray-light: #F2F2F2;
    --text: #ffffff;
    --text-sec: #aaaaaa;
    --text-muted: #555555;
    --border: rgba(255, 255, 255, 0.08);
    --border-light: rgba(255, 255, 255, 0.12);
    --radius: 16px;
    --radius-sm: 10px;
    --radius-xs: 6px;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  .dashboard {
    background:
      radial-gradient(ellipse at 20% 0%, rgba(56, 182, 255, 0.06) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 30%, rgba(56, 182, 255, 0.04) 0%, transparent 50%),
      radial-gradient(ellipse at 40% 80%, rgba(56, 182, 255, 0.03) 0%, transparent 60%),
      var(--bg);
  }

  /* ═══ LOGIN SCREEN ═══ */
  .login-screen {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background:
      radial-gradient(ellipse at 30% 20%, rgba(56, 182, 255, 0.07) 0%, transparent 50%),
      radial-gradient(ellipse at 70% 70%, rgba(56, 182, 255, 0.04) 0%, transparent 50%),
      var(--bg);
  }

  .login-box {
    width: 100%;
    max-width: 400px;
    padding: 48px 40px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    text-align: center;
  }

  .login-logo {
    width: 200px;
    margin: 0 auto 32px;
    display: block;
  }

  .login-title {
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-sec);
    margin-bottom: 32px;
  }

  .login-input {
    width: 100%;
    padding: 14px 18px;
    background: var(--bg-input);
    border: 1px solid var(--border-light);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: inherit;
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 4px;
    text-align: center;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .login-input::placeholder {
    letter-spacing: 1px;
    color: var(--text-muted);
    font-weight: 400;
  }

  .login-input:focus {
    border-color: var(--blue);
    box-shadow: 0 0 0 3px var(--blue-glow);
  }

  .login-btn {
    width: 100%;
    margin-top: 16px;
    padding: 14px;
    background: var(--blue);
    color: #000;
    border: none;
    border-radius: var(--radius-sm);
    font-family: inherit;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
  }

  .login-btn:hover { background: var(--blue-dark); }
  .login-btn:active { transform: scale(0.98); }

  .login-error {
    margin-top: 16px;
    color: #F87171;
    font-size: 13px;
    font-weight: 500;
    display: none;
  }

  .login-error.visible { display: block; }

  .login-help {
    margin-top: 24px;
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.5;
  }

  .login-help a {
    color: var(--text-sec);
    text-decoration: none;
    transition: color 0.2s;
  }

  .login-help a:hover { color: var(--blue); }

  /* ═══ NAV ═══ */
  .nav {
    position: sticky;
    top: 0;
    z-index: 100;
    height: 60px;
    padding: 0 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(17, 17, 17, 0.9);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border-bottom: 1px solid var(--border);
  }

  .nav-logo { height: 22px; }

  .nav-right {
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .nav-client {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-sec);
  }

  .nav-logout {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    cursor: pointer;
    transition: color 0.2s;
    background: none;
    border: none;
    font-family: inherit;
  }

  .nav-logout:hover { color: var(--text); }

  /* ═══ MAIN LAYOUT ═══ */
  .dashboard {
    display: none;
    flex-direction: column;
    min-height: 100vh;
  }

  .dashboard.active { display: flex; }
  .login-screen.hidden { display: none; }

  .main {
    max-width: 1200px;
    width: 100%;
    margin: 0 auto;
    padding: 40px 32px 80px;
  }

  /* ═══ CAMPAIGN HEADER ═══ */
  .campaign-header {
    margin-bottom: 40px;
  }

  .campaign-kicker {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--blue);
    margin-bottom: 8px;
  }

  .campaign-title {
    font-size: 32px;
    font-weight: 800;
    line-height: 1.2;
    margin-bottom: 8px;
  }

  .campaign-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    margin-top: 12px;
  }

  .campaign-meta-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: var(--text-sec);
  }

  .campaign-meta-item svg {
    width: 16px;
    height: 16px;
    opacity: 0.6;
  }

  /* ═══ PROGRESS BAR ═══ */
  .campaign-progress {
    margin-top: 20px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 16px 20px;
  }

  .progress-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }

  .progress-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .progress-days {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-sec);
  }

  .progress-days span { color: var(--blue); }

  .progress-track {
    width: 100%;
    height: 6px;
    background: rgba(255,255,255,0.06);
    border-radius: 3px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--blue), var(--blue-dark));
    border-radius: 3px;
    transition: width 1s cubic-bezier(0.16, 1, 0.3, 1);
  }

  /* ═══ SUMMARY CARDS (sticky) ═══ */
  .summary-wrap {
    margin-bottom: 48px;
  }

  .summary-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
  }

  .summary-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 24px;
    transition: border-color 0.2s;
    position: relative;
    overflow: hidden;
  }

  .summary-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
  }

  .summary-card.card-blue::before { background: var(--blue); }
  .summary-card.card-pink::before { background: var(--pink); }
  .summary-card.card-green::before { background: var(--green); }

  .summary-card:hover {
    border-color: var(--border-light);
  }

  .summary-top {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
  }

  .summary-icon {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .summary-icon svg {
    width: 18px;
    height: 18px;
  }

  .summary-icon.icon-blue {
    background: rgba(56, 182, 255, 0.12);
    color: var(--blue);
  }

  .summary-icon.icon-pink {
    background: rgba(244, 114, 182, 0.12);
    color: var(--pink);
  }

  .summary-icon.icon-green {
    background: rgba(52, 211, 153, 0.12);
    color: var(--green);
  }

  .summary-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .summary-value {
    font-size: 28px;
    font-weight: 800;
    line-height: 1;
    color: var(--text);
  }

  .summary-value .unit {
    font-size: 16px;
    font-weight: 600;
    color: var(--text-sec);
    margin-left: 2px;
  }

  .summary-sub {
    margin-top: 6px;
    font-size: 12px;
    color: var(--text-muted);
  }

  /* ═══ SECTION TITLES ═══ */
  .section-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 20px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }

  /* ═══ POST CARDS ═══ */
  .posts-list {
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  .post-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .post-card:hover { border-color: var(--border-light); }

  .post-top {
    display: grid;
    grid-template-columns: 280px 1fr;
    min-height: 320px;
  }

  .post-top.portrait {
    grid-template-columns: 200px 1fr;
  }

  .post-media {
    position: relative;
    background: #0d0d0d;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .post-top.portrait .post-media {
    aspect-ratio: 9 / 16;
  }

  .post-media img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .post-media-badge {
    position: absolute;
    top: 12px;
    left: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 10px;
    background: rgba(0, 0, 0, 0.7);
    backdrop-filter: blur(8px);
    border-radius: var(--radius-xs);
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .badge-instagram { color: var(--pink); }
  .badge-tiktok { color: var(--green); }

  .post-media-badge svg {
    width: 14px;
    height: 14px;
  }

  .post-info {
    padding: 28px 32px;
    display: flex;
    flex-direction: column;
  }

  .post-type-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
  }

  .post-type-tag {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 4px;
    background: rgba(56, 182, 255, 0.1);
    color: var(--blue);
  }

  .post-type-tag svg {
    width: 12px;
    height: 12px;
  }

  .post-type-tag.story {
    background: rgba(244, 114, 182, 0.1);
    color: var(--pink);
  }

  .post-type-tag.tiktok {
    background: rgba(52, 211, 153, 0.1);
    color: var(--green);
  }

  .post-date {
    font-size: 12px;
    color: var(--text-muted);
  }

  .post-caption {
    font-size: 13px;
    color: var(--text-sec);
    line-height: 1.6;
    margin: 12px 0 20px;
    flex: 1;
    display: -webkit-box;
    -webkit-line-clamp: 4;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .post-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    font-weight: 600;
    color: var(--blue);
    text-decoration: none;
    transition: opacity 0.2s;
    margin-top: auto;
  }

  .post-link:hover { opacity: 0.7; }

  .post-link svg {
    width: 14px;
    height: 14px;
  }

  /* ═══ METRICS GRID (inside post card) ═══ */
  .metrics-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 1px;
    background: var(--border);
    border-top: 1px solid var(--border);
  }

  .metric {
    background: var(--bg-card);
    padding: 18px 20px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .metric-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .metric-value {
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
  }

  .metric-value.accent { color: var(--blue); }

  .metric-value .metric-unit {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-sec);
    margin-left: 2px;
  }

  /* ═══ FOOTER ═══ */
  .footer {
    text-align: center;
    padding: 32px;
    font-size: 12px;
    color: var(--text-muted);
    border-top: 1px solid var(--border);
  }

  .footer a {
    color: var(--text-muted);
    text-decoration: none;
    transition: color 0.2s;
  }
  .footer a:hover { color: var(--text-sec); }

  /* ═══ RESPONSIVE ═══ */
  @media (max-width: 768px) {
    .nav { padding: 0 20px; }
    .main { padding: 24px 16px 60px; }

    .campaign-title { font-size: 24px; }

    .summary-wrap {
      margin: 0 -16px;
      padding-left: 16px;
      padding-right: 16px;
    }

    .summary-grid {
      grid-template-columns: 1fr;
      gap: 10px;
    }

    .summary-card { padding: 16px; }
    .summary-value { font-size: 22px; }

    .post-top {
      grid-template-columns: 1fr;
    }

    .post-top.portrait {
      grid-template-columns: 1fr;
    }

    .post-top.portrait .post-media {
      aspect-ratio: auto;
      height: 400px;
    }

    .post-media {
      height: 300px;
    }

    .post-info { padding: 20px; }

    .metrics-grid {
      grid-template-columns: repeat(2, 1fr);
    }

    .login-box {
      margin: 20px;
      padding: 36px 24px;
    }
  }

  @media (max-width: 390px) {
    .metrics-grid {
      grid-template-columns: 1fr 1fr;
    }
  }

  /* ═══ ANIMATIONS ═══ */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .animate-in {
    animation: fadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    opacity: 0;
  }

  .post-card { animation: fadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
  .post-card:nth-child(1) { animation-delay: 0.05s; }
  .post-card:nth-child(2) { animation-delay: 0.12s; }
  .post-card:nth-child(3) { animation-delay: 0.19s; }
  .post-card:nth-child(4) { animation-delay: 0.26s; }
  .post-card:nth-child(5) { animation-delay: 0.33s; }
</style>
</head>

function fmt(n) {
  if (n == null) return '—';
  if (n >= 1000000) return (n / 1000000).toFixed(1).replace('.', ',') + 'M';
  if (n >= 10000) return (n / 1000).toFixed(1).replace('.', ',') + 'K';
  return n.toLocaleString('de-DE');
}

function fmtDate(d) {
  return new Date(d).toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit', year: 'numeric' });
}

function daysAgo(d) {
  const now = new Date();
  const then = new Date(d);
  const diff = Math.floor((now - then) / (1000 * 60 * 60 * 24));
  if (diff === 0) return 'heute';
  if (diff === 1) return 'gestern';
  return `vor ${diff} Tagen`;
}

function platformIcon(platform) {
  if (platform === 'instagram') {
    return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1112.63 8 4 4 0 0116 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>`;
  }
  return `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M19.59 6.69a4.83 4.83 0 01-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 01-2.88 2.5 2.89 2.89 0 01-2.89-2.89 2.89 2.89 0 012.89-2.89c.28 0 .54.04.79.1V9.01a6.27 6.27 0 00-.79-.05 6.34 6.34 0 00-6.34 6.34 6.34 6.34 0 006.34 6.34 6.34 6.34 0 006.33-6.34V8.75a8.18 8.18 0 004.77 1.52V6.84a4.84 4.84 0 01-1-.15z"/></svg>`;
}

  if (platform === 'instagram') {
    return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1112.63 8 4 4 0 0116 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>`;
  }
  return `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M19.59 6.69a4.83 4.83 0 01-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 01-2.88 2.5 2.89 2.89 0 01-2.89-2.89 2.89 2.89 0 012.89-2.89c.28 0 .54.04.79.1V9.01a6.27 6.27 0 00-.79-.05 6.34 6.34 0 00-6.34 6.34 6.34 6.34 0 006.34 6.34 6.34 6.34 0 006.33-6.34V8.75a8.18 8.18 0 004.77 1.52V6.84a4.84 4.84 0 01-1-.15z"/></svg>`;
}

function linkIcon() {
  return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>`;
}

function eyeIcon() {
  return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
}

function heartIcon() {
  return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>`;
}

function percentIcon() {
  return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="5" x2="5" y2="19"/><circle cx="6.5" cy="6.5" r="2.5"/><circle cx="17.5" cy="17.5" r="2.5"/></svg>`;
}

// ═══════════════════════════════════════════════════════════════
//  LOGIN
// ═══════════════════════════════════════════════════════════════

function handleLogin(e) {
  e.preventDefault();
  const code = document.getElementById('loginCode').value.trim().toUpperCase();
  const client = CLIENTS[code];

  if (client) {
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('dashboard').classList.add('active');
    renderDashboard(client);
  } else {
    document.getElementById('loginError').classList.add('visible');
    document.getElementById('loginCode').focus();
    setTimeout(() => document.getElementById('loginError').classList.remove('visible'), 3000);
  }
  return false;
}

function logout() {
  document.getElementById('dashboard').classList.remove('active');
  document.getElementById('loginScreen').classList.remove('hidden');
  document.getElementById('loginCode').value = '';
  document.getElementById('mainContent').innerHTML = '';
}

// ═══════════════════════════════════════════════════════════════
//  RENDER DASHBOARD
// ═══════════════════════════════════════════════════════════════

function renderDashboard(client) {
  document.getElementById('navClient').textContent = client.name;
  const main = document.getElementById('mainContent');

  const campaign = client.campaigns[0];
  const posts = campaign.posts;

  // Calculate totals
  const totalViews = posts.reduce((s, p) => s + (p.insights.views || 0), 0);
  const totalLikes = posts.reduce((s, p) => s + (p.insights.likes || 0), 0);
  const totalComments = posts.reduce((s, p) => s + (p.insights.comments || 0), 0);
  const totalShares = posts.reduce((s, p) => s + (p.insights.shares || 0), 0);
  const totalSaves = posts.reduce((s, p) => s + (p.insights.saves || 0), 0);
  const totalInteractions = totalLikes + totalComments + totalShares + totalSaves;
  const totalReach = posts.reduce((s, p) => s + (p.insights.reach || 0), 0);
  const avgEngagement = totalReach > 0 ? ((totalInteractions / totalReach) * 100).toFixed(2) : 0;

  const campaignTitle = `${client.igHandle} x @hamburg Kampagne`;

  // Campaign progress (14-day campaigns)
  const start = new Date(campaign.startDate);
  const end = new Date(campaign.endDate);
  const now = new Date();
  const totalDays = Math.round((end - start) / (1000 * 60 * 60 * 24));
  const elapsedDays = Math.max(0, Math.min(totalDays, Math.round((now - start) / (1000 * 60 * 60 * 24))));
  const progressPct = Math.min(100, Math.round((elapsedDays / totalDays) * 100));
  const isFinished = now > end;

  main.innerHTML = `
    <!-- Campaign Header -->
    <div class="campaign-header animate-in">
      <div class="campaign-kicker">Kampagnen-Report</div>
      <h1 class="campaign-title">${campaignTitle}</h1>
      <div class="campaign-meta">
        <div class="campaign-meta-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          ${fmtDate(campaign.startDate)} — ${fmtDate(campaign.endDate)}
        </div>
        <div class="campaign-meta-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
          ${posts.length} Posts
        </div>
        <div class="campaign-meta-item" style="color: ${isFinished ? 'var(--text-muted)' : 'var(--green)'};">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          ${isFinished ? 'Abgeschlossen' : campaign.status}
        </div>
      </div>

      <!-- Progress -->
      <div class="campaign-progress">
        <div class="progress-header">
          <div class="progress-label">Kampagnen-Fortschritt</div>
          <div class="progress-days"><span>Tag ${elapsedDays}</span> von ${totalDays}</div>
        </div>
        <div class="progress-track">
          <div class="progress-fill" style="width: ${progressPct}%"></div>
        </div>
      </div>
    </div>

    <!-- Summary (sticky) -->
    <div class="summary-wrap animate-in" style="animation-delay: 0.1s;">
      <div class="summary-grid">
        <div class="summary-card card-blue">
          <div class="summary-top">
            <div class="summary-icon icon-blue">${eyeIcon()}</div>
            <div class="summary-label">Total Views</div>
          </div>
          <div class="summary-value">${fmt(totalViews)}</div>
          <div class="summary-sub">Views across all posts</div>
        </div>
        <div class="summary-card card-pink">
          <div class="summary-top">
            <div class="summary-icon icon-pink">${heartIcon()}</div>
            <div class="summary-label">Interactions</div>
          </div>
          <div class="summary-value">${fmt(totalInteractions)}</div>
          <div class="summary-sub">Likes, Comments, Shares, Saves</div>
        </div>
        <div class="summary-card card-green">
          <div class="summary-top">
            <div class="summary-icon icon-green">${percentIcon()}</div>
            <div class="summary-label">Engagement Rate</div>
          </div>
          <div class="summary-value">${avgEngagement}<span class="unit">%</span></div>
          <div class="summary-sub">Interactions / Reach</div>
        </div>
      </div>
    </div>

    <!-- Posts -->
    <div class="section-title">Einzelne Posts</div>
    <div class="posts-list">
      ${posts.map((post, i) => renderPostCard(post, i)).join('')}
    </div>
  `;
}

// ═══════════════════════════════════════════════════════════════
//  RENDER POST CARD
// ═══════════════════════════════════════════════════════════════

function renderPostCard(post, index) {
  const badgeClass = post.platform === 'instagram' ? 'badge-instagram' : 'badge-tiktok';
  const typeClass = post.typeKey === 'story' ? 'story' : post.typeKey === 'tiktok' ? 'tiktok' : '';
  const ins = post.insights;

  // Portrait layout for story, reel, tiktok — landscape for foto
  const isPortrait = post.typeKey === 'story' || post.typeKey === 'reel' || post.typeKey === 'tiktok';

  // Link to content (not for stories)
  let linkHTML = '';
  if (post.permalink) {
    const linkLabel = post.platform === 'tiktok' ? 'Auf TikTok ansehen' : 'Auf Instagram ansehen';
    linkHTML = `<a href="${post.permalink}" target="_blank" rel="noopener" class="post-link">${linkIcon()} ${linkLabel}</a>`;
  }

  // Platform icon inside type tag
  const tagIcon = platformIconSmall(post.platform);

  // Metrics — differs by type
  let metricsHTML = '';

  if (post.typeKey === 'foto') {
    metricsHTML = `
      <div class="metric"><div class="metric-label">Views</div><div class="metric-value accent">${fmt(ins.views)}</div></div>
      <div class="metric"><div class="metric-label">Reach</div><div class="metric-value">${fmt(ins.reach)}</div></div>
      <div class="metric"><div class="metric-label">Likes</div><div class="metric-value">${fmt(ins.likes)}</div></div>
      <div class="metric"><div class="metric-label">Comments</div><div class="metric-value">${fmt(ins.comments)}</div></div>
      <div class="metric"><div class="metric-label">Shares</div><div class="metric-value">${fmt(ins.shares)}</div></div>
      <div class="metric"><div class="metric-label">Saves</div><div class="metric-value">${fmt(ins.saves)}</div></div>
      <div class="metric"><div class="metric-label">Profile Visits</div><div class="metric-value">${fmt(ins.profileVisits)}</div></div>
      <div class="metric"><div class="metric-label">Engagement</div><div class="metric-value accent">${ins.engagementRate}<span class="metric-unit">%</span></div></div>
    `;
  } else if (post.typeKey === 'reel') {
    metricsHTML = `
      <div class="metric"><div class="metric-label">Views</div><div class="metric-value accent">${fmt(ins.views)}</div></div>
      <div class="metric"><div class="metric-label">Reach</div><div class="metric-value">${fmt(ins.reach)}</div></div>
      <div class="metric"><div class="metric-label">Likes</div><div class="metric-value">${fmt(ins.likes)}</div></div>
      <div class="metric"><div class="metric-label">Comments</div><div class="metric-value">${fmt(ins.comments)}</div></div>
      <div class="metric"><div class="metric-label">Shares</div><div class="metric-value">${fmt(ins.shares)}</div></div>
      <div class="metric"><div class="metric-label">Saves</div><div class="metric-value">${fmt(ins.saves)}</div></div>
      <div class="metric"><div class="metric-label">Avg. Watch Time</div><div class="metric-value">${ins.avgWatchTime}<span class="metric-unit">s</span></div></div>
      <div class="metric"><div class="metric-label">Engagement</div><div class="metric-value accent">${ins.engagementRate}<span class="metric-unit">%</span></div></div>
    `;
  } else if (post.typeKey === 'story') {
    metricsHTML = `
      <div class="metric"><div class="metric-label">Views</div><div class="metric-value accent">${fmt(ins.views)}</div></div>
      <div class="metric"><div class="metric-label">Reach</div><div class="metric-value">${fmt(ins.reach)}</div></div>
      <div class="metric"><div class="metric-label">Tap Forward</div><div class="metric-value">${fmt(ins.tapForward)}</div></div>
      <div class="metric"><div class="metric-label">Tap Back</div><div class="metric-value">${fmt(ins.tapBack)}</div></div>
      <div class="metric"><div class="metric-label">Exits</div><div class="metric-value">${fmt(ins.tapExit)}</div></div>
      <div class="metric"><div class="metric-label">Shares</div><div class="metric-value">${fmt(ins.shares)}</div></div>
      <div class="metric"><div class="metric-label">Link Clicks</div><div class="metric-value accent">${fmt(ins.linkClicks)}</div></div>
      <div class="metric"><div class="metric-label">Profile Visits</div><div class="metric-value">${fmt(ins.profileVisits)}</div></div>
    `;
  } else if (post.typeKey === 'tiktok') {
    metricsHTML = `
      <div class="metric"><div class="metric-label">Views</div><div class="metric-value accent">${fmt(ins.views)}</div></div>
      <div class="metric"><div class="metric-label">Reach</div><div class="metric-value">${fmt(ins.reach)}</div></div>
      <div class="metric"><div class="metric-label">Likes</div><div class="metric-value">${fmt(ins.likes)}</div></div>
      <div class="metric"><div class="metric-label">Comments</div><div class="metric-value">${fmt(ins.comments)}</div></div>
      <div class="metric"><div class="metric-label">Shares</div><div class="metric-value">${fmt(ins.shares)}</div></div>
      <div class="metric"><div class="metric-label">Saves</div><div class="metric-value">${fmt(ins.saves)}</div></div>
      <div class="metric"><div class="metric-label">Avg. Watch Time</div><div class="metric-value">${ins.avgWatchTime}<span class="metric-unit">s</span></div></div>
      <div class="metric"><div class="metric-label">Full Watch Rate</div><div class="metric-value accent">${ins.fullVideoWatchedRate}<span class="metric-unit">%</span></div></div>
    `;
  }

  return `
    <div class="post-card">
      <div class="post-top${isPortrait ? ' portrait' : ''}">
        <div class="post-media">
          <img src="${post.mediaUrl}" alt="${post.type}" loading="lazy">
          <div class="post-media-badge ${badgeClass}">
            ${platformIcon(post.platform)}
            ${post.platform === 'instagram' ? 'Instagram' : 'TikTok'}
          </div>
        </div>
        <div class="post-info">
          <div class="post-type-row">
            <span class="post-type-tag ${typeClass}">${tagIcon} ${post.type}</span>
            <span class="post-date">${fmtDate(post.date)} · ${daysAgo(post.date)}</span>
          </div>
          <p class="post-caption">${post.caption}</p>
          ${linkHTML}
        </div>
      </div>
      <div class="metrics-grid">
        ${metricsHTML}
      </div>
    </div>
  `;
}
</script>
