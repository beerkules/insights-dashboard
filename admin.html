<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Hashtag Hamburg — Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #111111; --bg-card: #1a1a1a; --bg-input: #1e1e1e;
    --blue: #38B6FF; --blue-dark: #1A8FCC; --blue-glow: rgba(56,182,255,0.25);
    --green: #34D399; --pink: #F472B6; --red: #F87171;
    --text: #ffffff; --text-sec: #aaaaaa; --text-muted: #555555;
    --border: rgba(255,255,255,0.08); --border-light: rgba(255,255,255,0.12);
    --radius: 16px; --radius-sm: 10px; --radius-xs: 6px;
  }

  html.light {
    --bg: #f5f5f7; --bg-card: #ffffff; --bg-input: #f0f0f2;
    --blue: #1A8FCC; --blue-dark: #1574A8; --blue-glow: rgba(26,143,204,0.2);
    --green: #16a34a; --pink: #db2777; --red: #dc2626;
    --text: #111111; --text-sec: #555555; --text-muted: #999999;
    --border: rgba(0,0,0,0.08); --border-light: rgba(0,0,0,0.12);
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg); color: var(--text); line-height: 1.6;
    -webkit-font-smoothing: antialiased; min-height: 100vh;
  }

  html.light .nav-logo, html.light .login-logo { content: url('logo-dark.svg'); }
  html.light .btn-primary { color: #fff; }

  /* ═══ LOGIN ═══ */
  .login-screen {
    display: flex; align-items: center; justify-content: center; min-height: 100vh;
    background: radial-gradient(ellipse at 30% 20%, rgba(56,182,255,0.07) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 70%, rgba(56,182,255,0.04) 0%, transparent 50%), var(--bg);
  }
  html.light .login-screen {
    background: radial-gradient(ellipse at 30% 20%, rgba(26,143,204,0.06) 0%, transparent 50%), var(--bg);
  }

  .login-box {
    width: 100%; max-width: 400px; padding: 48px 40px;
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: var(--radius); text-align: center;
  }
  html.light .login-box { box-shadow: 0 8px 32px rgba(0,0,0,0.08); }

  .login-logo { width: 200px; margin: 0 auto 32px; display: block; }

  .login-title {
    font-size: 14px; font-weight: 600; letter-spacing: 2px;
    text-transform: uppercase; color: var(--text-sec); margin-bottom: 32px;
  }

  .login-input {
    width: 100%; padding: 14px 18px; background: var(--bg-input);
    border: 1px solid var(--border-light); border-radius: var(--radius-sm);
    color: var(--text); font-family: inherit; font-size: 15px; font-weight: 500;
    letter-spacing: 4px; text-align: center; outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .login-input::placeholder { letter-spacing: 1px; color: var(--text-muted); font-weight: 400; }
  .login-input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px var(--blue-glow); }

  .login-error { margin-top: 16px; color: var(--red); font-size: 13px; font-weight: 500; display: none; }
  .login-error.visible { display: block; }

  /* ═══ NAV ═══ */
  .nav {
    position: sticky; top: 0; z-index: 100; height: 60px; padding: 0 32px;
    display: flex; align-items: center; justify-content: space-between;
    background: var(--bg); border-bottom: 1px solid var(--border);
  }
  .nav-logo { height: 22px; }
  .nav-right { display: flex; align-items: center; gap: 12px; }
  .nav-logout {
    font-size: 12px; font-weight: 600; color: var(--text-muted); text-transform: uppercase;
    letter-spacing: 1px; cursor: pointer; transition: color 0.2s; background: none;
    border: none; font-family: inherit;
  }
  .nav-logout:hover { color: var(--text); }

  .theme-toggle {
    background: none; border: 1px solid var(--border); border-radius: var(--radius-xs);
    width: 34px; height: 34px; display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: var(--text-muted); transition: all 0.2s;
  }
  .theme-toggle:hover { border-color: var(--border-light); color: var(--text-sec); }
  .theme-toggle svg { width: 16px; height: 16px; }

  /* ═══ LAYOUT ═══ */
  .admin { display: none; flex-direction: column; min-height: 100vh; }
  .admin.active { display: flex; }
  .login-screen.hidden { display: none; }

  .main { max-width: 900px; width: 100%; margin: 0 auto; padding: 40px 32px 80px; }

  /* ═══ HEADINGS ═══ */
  .page-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 32px; flex-wrap: wrap; gap: 12px;
  }
  .page-title { font-size: 24px; font-weight: 800; }
  .page-sub { font-size: 12px; color: var(--text-muted); margin-top: 4px; }

  .breadcrumb {
    display: flex; align-items: center; gap: 8px; margin-bottom: 24px;
    font-size: 12px; color: var(--text-muted);
  }
  .breadcrumb a { color: var(--blue); text-decoration: none; cursor: pointer; }
  .breadcrumb a:hover { opacity: 0.7; }
  .breadcrumb svg { width: 12px; height: 12px; }

  /* ═══ BUTTONS ═══ */
  .btn {
    display: inline-flex; align-items: center; gap: 6px; padding: 10px 18px;
    border-radius: var(--radius-xs); font-family: inherit; font-size: 13px;
    font-weight: 600; cursor: pointer; transition: all 0.2s; border: none;
    letter-spacing: 0.5px;
  }
  .btn svg { width: 14px; height: 14px; }

  .btn-primary { background: var(--blue); color: #000; }
  .btn-primary:hover { background: var(--blue-dark); }

  .btn-secondary {
    background: transparent; color: var(--text-sec);
    border: 1px solid var(--border-light);
  }
  .btn-secondary:hover { border-color: var(--blue); color: var(--blue); }

  .btn-danger { background: transparent; color: var(--red); border: 1px solid rgba(248,113,113,0.2); }
  .btn-danger:hover { background: rgba(248,113,113,0.1); }

  .btn-sm { padding: 6px 12px; font-size: 11px; }

  /* ═══ CARDS ═══ */
  .card-list { display: flex; flex-direction: column; gap: 12px; }

  .card {
    background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 20px 24px; display: flex; align-items: center; justify-content: space-between;
    gap: 16px; transition: border-color 0.2s; cursor: pointer;
  }
  .card:hover { border-color: var(--border-light); }

  .card-info { flex: 1; min-width: 0; }
  .card-title { font-size: 15px; font-weight: 700; }
  .card-sub { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

  .card-actions { display: flex; gap: 8px; flex-shrink: 0; }

  .card-badge {
    font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
    padding: 3px 8px; border-radius: 4px;
  }
  .card-badge.active { background: rgba(52,211,153,0.1); color: var(--green); }
  .card-badge.planned { background: rgba(56,182,255,0.1); color: var(--blue); }
  .card-badge.done { background: rgba(255,255,255,0.05); color: var(--text-muted); }

  /* ═══ FORMS ═══ */
  .form-section { margin-bottom: 32px; }
  .form-section-title {
    font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
    color: var(--text-muted); margin-bottom: 16px; padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  .form-row { display: flex; gap: 16px; margin-bottom: 16px; }
  .form-row > * { flex: 1; }

  .form-group { margin-bottom: 16px; }
  .form-label {
    display: block; font-size: 11px; font-weight: 600; letter-spacing: 1px;
    text-transform: uppercase; color: var(--text-muted); margin-bottom: 6px;
  }

  .form-input, .form-select, .form-textarea {
    width: 100%; padding: 10px 14px; background: var(--bg-input);
    border: 1px solid var(--border-light); border-radius: var(--radius-xs);
    color: var(--text); font-family: inherit; font-size: 14px; outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .form-input:focus, .form-select:focus, .form-textarea:focus {
    border-color: var(--blue); box-shadow: 0 0 0 3px var(--blue-glow);
  }
  .form-select { cursor: pointer; }
  .form-textarea { resize: vertical; min-height: 80px; }

  .form-radio-group { display: flex; gap: 12px; flex-wrap: wrap; }
  .form-radio {
    display: flex; align-items: center; gap: 6px; padding: 8px 14px;
    background: var(--bg-input); border: 1px solid var(--border-light);
    border-radius: var(--radius-xs); cursor: pointer; transition: all 0.2s;
    font-size: 13px; font-weight: 500;
  }
  .form-radio:hover { border-color: var(--border-light); }
  .form-radio.selected { border-color: var(--blue); background: rgba(56,182,255,0.08); color: var(--blue); }

  .form-radio input { display: none; }

  .form-actions { display: flex; gap: 12px; margin-top: 24px; }

  /* ═══ DATA TOOLBAR ═══ */
  .data-toolbar {
    display: flex; gap: 8px; padding: 16px 0; border-top: 1px solid var(--border);
    margin-top: 40px;
  }

  /* ═══ POST PREVIEW ═══ */
  .post-thumb {
    width: 48px; height: 48px; border-radius: var(--radius-xs);
    object-fit: cover; background: var(--bg-input); flex-shrink: 0;
  }

  /* ═══ EMPTY STATE ═══ */
  .empty-state {
    text-align: center; padding: 48px 24px; color: var(--text-muted); font-size: 14px;
  }
  .empty-state svg { width: 40px; height: 40px; opacity: 0.3; margin-bottom: 12px; }

  /* ═══ IMAGE UPLOAD ═══ */
  .upload-area {
    border: 2px dashed var(--border-light); border-radius: var(--radius-sm);
    padding: 24px; text-align: center; cursor: pointer; transition: all 0.2s;
    color: var(--text-muted); font-size: 13px;
  }
  .upload-area:hover { border-color: var(--blue); color: var(--text-sec); }
  .upload-area.has-image { border-style: solid; padding: 8px; }
  .upload-area svg { width: 32px; height: 32px; opacity: 0.3; }
  .upload-area img { max-width: 100%; max-height: 200px; border-radius: var(--radius-xs); }
  .upload-area input { display: none; }

  /* ═══ SCREENSHOT UPLOAD ═══ */
  .screenshot-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px;
  }
  @media (max-width: 768px) { .screenshot-grid { grid-template-columns: 1fr; } }

  .screenshot-col h3 {
    font-size: 13px; font-weight: 700; margin-bottom: 8px; color: var(--text-sec);
  }
  .screenshot-col p { font-size: 11px; color: var(--text-muted); margin-bottom: 12px; }

  .drop-zone {
    border: 2px dashed var(--border-light); border-radius: var(--radius-sm);
    padding: 32px 20px; text-align: center; cursor: pointer; transition: all 0.2s;
    color: var(--text-muted); font-size: 13px; min-height: 160px;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px;
  }
  .drop-zone:hover, .drop-zone.dragover { border-color: var(--blue); color: var(--blue); background: rgba(56,182,255,0.04); }
  .drop-zone svg { width: 32px; height: 32px; opacity: 0.4; }
  .drop-zone input { display: none; }

  .drop-zone.has-files { border-style: solid; padding: 12px; }

  .preview-grid {
    display: flex; gap: 8px; flex-wrap: wrap; justify-content: center;
  }
  .preview-grid img {
    width: 80px; height: 80px; object-fit: cover; border-radius: var(--radius-xs);
  }
  .preview-single img {
    max-width: 100%; max-height: 200px; border-radius: var(--radius-xs);
  }

  .spinner {
    width: 24px; height: 24px; border: 3px solid var(--border);
    border-top-color: var(--blue); border-radius: 50%;
    animation: spin 0.7s linear infinite; display: inline-block;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .analyze-status {
    text-align: center; padding: 40px; color: var(--text-sec); font-size: 14px;
  }
  .analyze-status .spinner { width: 32px; height: 32px; margin-bottom: 16px; }

  .btn-group { display: flex; gap: 8px; }

  /* ═══ CONFIRM DIALOG ═══ */
  .confirm-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 200;
    display: flex; align-items: center; justify-content: center;
  }
  .confirm-box {
    background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 28px 32px; max-width: 400px; width: 100%; text-align: center;
  }
  .confirm-box p { margin-bottom: 20px; font-size: 14px; }
  .confirm-box .form-actions { justify-content: center; }

  /* ═══ RESPONSIVE ═══ */
  @media (max-width: 768px) {
    .nav { padding: 0 16px; }
    .main { padding: 24px 16px 60px; }
    .form-row { flex-direction: column; gap: 0; }
    .page-title { font-size: 20px; }
    .login-box { margin: 20px; padding: 36px 24px; }
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <img src="logo.svg" alt="Hashtag Hamburg" class="login-logo">
    <div class="login-title">Admin Panel</div>
    <form onsubmit="return handleLogin(event)">
      <input type="password" class="login-input" id="loginCode" placeholder="Admin-Code eingeben" autocomplete="off" autofocus>
      <button type="submit" class="btn btn-primary" style="width:100%;margin-top:16px;padding:14px;font-size:14px;letter-spacing:1px;text-transform:uppercase;">Anmelden</button>
    </form>
    <div class="login-error" id="loginError">Ungültiger Admin-Code</div>
  </div>
</div>

<!-- ADMIN -->
<div class="admin" id="admin">
  <nav class="nav">
    <img src="logo.svg" alt="Hashtag Hamburg" class="nav-logo">
    <div class="nav-right">
      <button class="theme-toggle" onclick="toggleTheme()">
        <svg id="themeIconSun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <svg id="themeIconMoon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
      </button>
      <button class="nav-logout" onclick="logout()">Logout</button>
    </div>
  </nav>
  <div class="main" id="mainContent"></div>
</div>

<!-- CONFIRM DIALOG -->
<div class="confirm-overlay" id="confirmDialog" style="display:none">
  <div class="confirm-box">
    <p id="confirmText"></p>
    <div class="form-actions">
      <button class="btn btn-secondary" onclick="closeConfirm()">Abbrechen</button>
      <button class="btn btn-danger" id="confirmBtn" onclick="">Löschen</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════════
const STORAGE_KEY = 'hh-dashboard-clients';
let clients = {};

function loadClients() {
  const raw = localStorage.getItem(STORAGE_KEY);
  clients = raw ? JSON.parse(raw) : {};
}

function saveClients() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(clients));
}

function genId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
}

// ═══════════════════════════════════════════════════════════════
//  THEME
// ═══════════════════════════════════════════════════════════════
function applyTheme(t) {
  document.documentElement.classList.toggle('light', t === 'light');
  document.getElementById('themeIconSun').style.display = t === 'dark' ? '' : 'none';
  document.getElementById('themeIconMoon').style.display = t === 'light' ? '' : 'none';
}
function toggleTheme() {
  const next = document.documentElement.classList.contains('light') ? 'dark' : 'light';
  localStorage.setItem('hh-theme', next);
  applyTheme(next);
}
applyTheme(localStorage.getItem('hh-theme') || 'light');

// ═══════════════════════════════════════════════════════════════
//  LOGIN
// ═══════════════════════════════════════════════════════════════
function handleLogin(e) {
  e.preventDefault();
  if (document.getElementById('loginCode').value === 'faruk21') {
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('admin').classList.add('active');
    loadClients();
    showClientList();
  } else {
    const err = document.getElementById('loginError');
    err.classList.add('visible');
    setTimeout(() => err.classList.remove('visible'), 3000);
  }
  return false;
}

function logout() {
  document.getElementById('admin').classList.remove('active');
  document.getElementById('loginScreen').classList.remove('hidden');
  document.getElementById('loginCode').value = '';
}

// ═══════════════════════════════════════════════════════════════
//  CONFIRM DIALOG
// ═══════════════════════════════════════════════════════════════
let confirmCallback = null;
function showConfirm(text, cb) {
  document.getElementById('confirmText').textContent = text;
  document.getElementById('confirmDialog').style.display = '';
  confirmCallback = cb;
  document.getElementById('confirmBtn').onclick = () => { closeConfirm(); if (confirmCallback) confirmCallback(); };
}
function closeConfirm() { document.getElementById('confirmDialog').style.display = 'none'; }

// ═══════════════════════════════════════════════════════════════
//  ICONS
// ═══════════════════════════════════════════════════════════════
const IC = {
  plus: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>`,
  edit: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`,
  trash: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>`,
  chev: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>`,
  download: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>`,
  upload: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>`,
  img: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>`,
  user: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>`,
  folder: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>`,
  camera: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>`,
  zap: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>`,
};

// ═══════════════════════════════════════════════════════════════
//  VIEW: CLIENT LIST
// ═══════════════════════════════════════════════════════════════
function showClientList() {
  const main = document.getElementById('mainContent');
  const keys = Object.keys(clients);

  main.innerHTML = `
    <div class="page-header">
      <div><div class="page-title">Kunden</div><div class="page-sub">${keys.length} Kunden verwaltet</div></div>
      <button class="btn btn-primary" onclick="showClientForm()">${IC.plus} Neuer Kunde</button>
    </div>
    ${keys.length === 0 ? `<div class="empty-state">${IC.user}<br>Noch keine Kunden angelegt.</div>` : `
      <div class="card-list">
        ${keys.map(code => {
          const c = clients[code];
          const postCount = c.campaigns ? c.campaigns.reduce((s, camp) => s + (camp.posts ? camp.posts.length : 0), 0) : 0;
          return `<div class="card" onclick="showClientDetail('${code}')">
            <div class="card-info">
              <div class="card-title">${c.name}</div>
              <div class="card-sub">${c.igHandle || ''} · Code: ${c.code} · ${c.campaigns ? c.campaigns.length : 0} Kampagnen · ${postCount} Posts</div>
            </div>
            <div class="card-actions">
              <button class="btn btn-sm btn-secondary" onclick="event.stopPropagation(); showClientForm('${code}')">${IC.edit}</button>
              <button class="btn btn-sm btn-danger" onclick="event.stopPropagation(); deleteClient('${code}')">${IC.trash}</button>
            </div>
          </div>`;
        }).join('')}
      </div>
    `}
    <div class="data-toolbar">
      <button class="btn btn-secondary btn-sm" onclick="exportJSON()">${IC.download} Export JSON</button>
      <button class="btn btn-secondary btn-sm" onclick="document.getElementById('importFile').click()">${IC.upload} Import JSON</button>

  `;
}

function showClientForm(code) {
  const main = document.getElementById('mainContent');
  const isEdit = !!code;
  const c = isEdit ? clients[code] : { name: '', igHandle: '', code: '' };

  main.innerHTML = `
    <div class="breadcrumb"><a onclick="showClientList()">Kunden</a> ${IC.chev} <span>${isEdit ? 'Bearbeiten' : 'Neuer Kunde'}</span></div>
    <div class="page-header"><div class="page-title">${isEdit ? c.name + ' bearbeiten' : 'Neuer Kunde'}</div></div>
    <div class="form-section">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Firmenname</label>
          <input class="form-input" id="fName" value="${c.name}" placeholder="z.B. Fairmont Hotel Hamburg">
        </div>
        <div class="form-group">
          <label class="form-label">Instagram Handle</label>
          <input class="form-input" id="fHandle" value="${c.igHandle || ''}" placeholder="z.B. @fairmonthamburg">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Zugangscode (für Kunden-Login)</label>
        <input class="form-input" id="fCode" value="${c.code}" placeholder="z.B. FAIRMONT2026" style="text-transform:uppercase;letter-spacing:2px;">
      </div>
    </div>

      <button class="btn btn-secondary" onclick="showClientList()">Abbrechen</button>
    </div>
  `;
}

function saveClient(oldCode) {
  const name = document.getElementById('fName').value.trim();
  const handle = document.getElementById('fHandle').value.trim();
  const code = document.getElementById('fCode').value.trim().toUpperCase();
  if (!name || !code) return alert('Name und Zugangscode sind Pflichtfelder.');
  if (oldCode && oldCode !== code) delete clients[oldCode];
  if (!clients[code]) clients[code] = { name, igHandle: handle, code, campaigns: [] };
  else { clients[code].name = name; clients[code].igHandle = handle; clients[code].code = code; }
  saveClients();
  showClientDetail(code);
}

function deleteClient(code) {
  showConfirm(`"${clients[code].name}" wirklich löschen?`, () => {
    delete clients[code];
    saveClients();
    showClientList();
  });
}

function showClientDetail(code) {
  const main = document.getElementById('mainContent');
  const c = clients[code];
  if (!c) return showClientList();

  main.innerHTML = `
    <div class="breadcrumb"><a onclick="showClientList()">Kunden</a> ${IC.chev} <span>${c.name}</span></div>
    <div class="page-header">
      <div><div class="page-title">${c.name}</div><div class="page-sub">${c.igHandle || ''} · Code: ${c.code}</div></div>
      <button class="btn btn-primary" onclick="showCampaignForm('${code}')">${IC.plus} Neue Kampagne</button>
    </div>
    ${(!c.campaigns || c.campaigns.length === 0) ? `<div class="empty-state">${IC.folder}<br>Noch keine Kampagnen.</div>` : `
      <div class="card-list">
        ${c.campaigns.map((camp, i) => {
          const statusClass = camp.status === 'Aktiv' ? 'active' : camp.status === 'Geplant' ? 'planned' : 'done';
          return `<div class="card" onclick="showCampaignDetail('${code}', ${i})">
            <div class="card-info">
              <div class="card-title">${camp.label} <span class="card-badge ${statusClass}">${camp.status}</span></div>
              <div class="card-sub">${camp.startDate} — ${camp.endDate} · ${camp.posts ? camp.posts.length : 0} Posts</div>

          </div>`;
        }).join('')}

}

function showCampaignForm(code, idx) {
  const main = document.getElementById('mainContent');
  const c = clients[code];
  const isEdit = idx !== undefined;
  const camp = isEdit ? c.campaigns[idx] : { label: `Kampagne ${(c.campaigns || []).length + 1}`, startDate: '', endDate: '', status: 'Geplant', posts: [] };

  main.innerHTML = `
    <div class="breadcrumb"><a onclick="showClientList()">Kunden</a> ${IC.chev} <a onclick="showClientDetail('${code}')">${c.name}</a> ${IC.chev} <span>${isEdit ? 'Kampagne bearbeiten' : 'Neue Kampagne'}</span></div>

    <div class="form-section">
      <div class="form-group">
        <label class="form-label">Label</label>
        <input class="form-input" id="fLabel" value="${camp.label}">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Startdatum</label>
          <input type="date" class="form-input" id="fStart" value="${camp.startDate}">
        </div>
        <div class="form-group">
          <label class="form-label">Enddatum</label>

function selectRadio(el, groupId) {
  document.querySelectorAll(`#${groupId} .form-radio`).forEach(r => r.classList.remove('selected'));
  el.classList.add('selected');
  el.querySelector('input').checked = true;
}

function saveCampaign(code, idx) {
  const label = document.getElementById('fLabel').value.trim();
  const start = document.getElementById('fStart').value;
  const end = document.getElementById('fEnd').value;
  const status = document.querySelector('#fStatus input:checked')?.value || 'Geplant';
  if (!label || !start || !end) return alert('Alle Felder ausfüllen.');
  const camp = { id: genId(), label, startDate: start, endDate: end, status, posts: [] };
  if (idx >= 0) { camp.posts = clients[code].campaigns[idx].posts || []; camp.id = clients[code].campaigns[idx].id || camp.id; clients[code].campaigns[idx] = camp; }
  else { if (!clients[code].campaigns) clients[code].campaigns = []; clients[code].campaigns.push(camp); }
  saveClients();
  showClientDetail(code);
}

function deleteCampaign(code, idx) {
  showConfirm('Kampagne wirklich löschen?', () => {
    clients[code].campaigns.splice(idx, 1);
    saveClients();
    showClientDetail(code);
  });
}

let currentMediaUrl = '';

const METRICS_BY_TYPE = {

    { key: 'views', label: 'Views' }, { key: 'reach', label: 'Reach' },
    { key: 'likes', label: 'Likes' }, { key: 'comments', label: 'Comments' },

    { key: 'profileVisits', label: 'Profile Visits' }, { key: 'engagementRate', label: 'Engagement Rate (%)' }
  ],
  reel: [
    { key: 'views', label: 'Views' }, { key: 'reach', label: 'Reach' },
    { key: 'likes', label: 'Likes' }, { key: 'comments', label: 'Comments' },
    { key: 'shares', label: 'Shares' }, { key: 'saves', label: 'Saves' },
    { key: 'avgWatchTime', label: 'Avg. Watch Time (s)' }, { key: 'engagementRate', label: 'Engagement Rate (%)' }
  ],
  story: [
    { key: 'views', label: 'Views' }, { key: 'reach', label: 'Reach' },
    { key: 'tapForward', label: 'Tap Forward' }, { key: 'tapBack', label: 'Tap Back' },
    { key: 'tapExit', label: 'Exits' }, { key: 'replies', label: 'Replies' },
    { key: 'shares', label: 'Shares' }, { key: 'profileVisits', label: 'Profile Visits' },
    { key: 'linkClicks', label: 'Link Clicks' }
  ],
  tiktok: [
    { key: 'views', label: 'Views' }, { key: 'reach', label: 'Reach' },
    { key: 'likes', label: 'Likes' }, { key: 'comments', label: 'Comments' },
    { key: 'shares', label: 'Shares' }, { key: 'saves', label: 'Saves' },
    { key: 'avgWatchTime', label: 'Avg. Watch Time (s)' }, { key: 'fullVideoWatchedRate', label: 'Full Watch Rate (%)' }
  ]
};

function getTypeKey(platform, type) {
  if (platform === 'tiktok') return 'tiktok';
  if (type === 'Story') return 'story';
  if (type === 'Reel') return 'reel';
  return 'foto';
}

function showPostForm(code, campIdx, postIdx, prefill) {
  const main = document.getElementById('mainContent');
  const c = clients[code];
  const camp = c.campaigns[campIdx];
  const isEdit = postIdx !== undefined;
  const post = prefill || (isEdit ? camp.posts[postIdx] : { platform: 'instagram', type: 'Foto', typeKey: 'foto', date: '', caption: '', mediaUrl: '', permalink: '', insights: {} });
  currentMediaUrl = post.mediaUrl || '';

  const tk = getTypeKey(post.platform, post.type);
  const metrics = METRICS_BY_TYPE[tk] || METRICS_BY_TYPE.foto;

  main.innerHTML = `
    <div class="breadcrumb">
      <a onclick="showClientList()">Kunden</a> ${IC.chev}
      <a onclick="showClientDetail('${code}')">${c.name}</a> ${IC.chev}
      <a onclick="showCampaignDetail('${code}', ${campIdx})">${camp.label}</a> ${IC.chev}
      <span>${isEdit ? 'Post bearbeiten' : 'Neuer Post'}</span>
    </div>
    <div class="page-header"><div class="page-title">${isEdit ? 'Post bearbeiten' : 'Neuer Post'}</div></div>

    <div class="form-section">
      <div class="form-section-title">Allgemein</div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Plattform</label>

              <input type="radio" name="platform" value="instagram" ${post.platform === 'instagram' ? 'checked' : ''}> Instagram
            </label>

          <label class="form-label">Typ</label>
          <div class="form-radio-group" id="fType">
            ${['Foto', 'Story', 'Reel'].map(t => `
              <label class="form-radio ${post.type === t ? 'selected' : ''}" onclick="selectRadio(this, 'fType'); updateMetrics('${code}', ${campIdx}, ${postIdx !== undefined ? postIdx : -1})">
                <input type="radio" name="type" value="${t}" ${post.type === t ? 'checked' : ''}> ${t}
              </label>
            `).join('')}
          </div>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Datum</label>
          <input type="date" class="form-input" id="fDate" value="${post.date}">
        </div>
        <div class="form-group">
          <label class="form-label">Permalink (optional)</label>

      </div>
    </div>

    <div class="form-section">
      <div class="form-section-title">Bild / Video</div>
      <div class="form-group">
        <label class="form-label">Bild-URL oder Datei hochladen</label>
        <input class="form-input" id="fMediaUrl" value="${post.mediaUrl || ''}" placeholder="https://..." oninput="updateUploadPreview()" style="margin-bottom:12px;">
        <div class="upload-area ${currentMediaUrl ? 'has-image' : ''}" id="uploadArea" onclick="document.getElementById('fileInput').click()">
          ${currentMediaUrl ? `<img src="${currentMediaUrl}" alt="Preview">` : `${IC.img}<br>Klicken zum Hochladen oder Bild-URL oben eingeben`}
          <input type="file" id="fileInput" accept="image/*" onchange="handleFileUpload(event)">
        </div>
      </div>
    </div>

    <div class="form-section" id="metricsSection">
      <div class="form-section-title">Metriken</div>
      <div class="form-row" style="flex-wrap:wrap;" id="metricsFields">
        ${metrics.map(m => `
          <div class="form-group" style="flex:0 0 calc(50% - 8px);">
            <label class="form-label">${m.label}</label>
            <input class="form-input" type="number" step="any" id="m_${m.key}" value="${post.insights[m.key] != null ? post.insights[m.key] : ''}" placeholder="0">
          </div>
        `).join('')}
      </div>
    </div>

    <div class="form-actions">
      <button class="btn btn-primary" onclick="savePost('${code}', ${campIdx}, ${postIdx !== undefined ? postIdx : -1})">${isEdit ? 'Speichern' : 'Post anlegen'}</button>
      <button class="btn btn-secondary" onclick="showCampaignDetail('${code}', ${campIdx})">Abbrechen</button>

  `;
}

function updatePostType() {
  const platform = document.querySelector('#fPlatform input:checked')?.value;
  const typeGroup = document.getElementById('typeGroup');
  if (platform === 'tiktok') {
    typeGroup.style.display = 'none';
  } else {
    typeGroup.style.display = '';
  }
}

function updateMetrics(code, campIdx, postIdx) {
  const platform = document.querySelector('#fPlatform input:checked')?.value || 'instagram';
  const type = document.querySelector('#fType input:checked')?.value || 'Foto';
  const tk = getTypeKey(platform, type);
  const metrics = METRICS_BY_TYPE[tk] || METRICS_BY_TYPE.foto;
  const oldValues = {};
  document.querySelectorAll('#metricsFields input').forEach(inp => {
    const key = inp.id.replace('m_', '');
    if (inp.value) oldValues[key] = inp.value;
  });
  document.getElementById('metricsFields').innerHTML = metrics.map(m => `
    <div class="form-group" style="flex:0 0 calc(50% - 8px);">
      <label class="form-label">${m.label}</label>
      <input class="form-input" type="number" step="any" id="m_${m.key}" value="${oldValues[m.key] || ''}" placeholder="0">
    </div>
  `).join('');
}

function updateUploadPreview() {
  const url = document.getElementById('fMediaUrl').value.trim();
  const area = document.getElementById('uploadArea');
  if (url) {
    currentMediaUrl = url;
    area.classList.add('has-image');
    area.innerHTML = `<img src="${url}" alt="Preview"><input type="file" id="fileInput" accept="image/*" onchange="handleFileUpload(event)">`;
  }
}

function handleFileUpload(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    currentMediaUrl = ev.target.result;
    document.getElementById('fMediaUrl').value = '';
    const area = document.getElementById('uploadArea');
    area.classList.add('has-image');
    area.innerHTML = `<img src="${currentMediaUrl}" alt="Preview"><input type="file" id="fileInput" accept="image/*" onchange="handleFileUpload(event)">`;
  };
  reader.readAsDataURL(file);
}

function savePost(code, campIdx, postIdx) {
  const platform = document.querySelector('#fPlatform input:checked')?.value || 'instagram';
  const type = platform === 'tiktok' ? 'Reel' : (document.querySelector('#fType input:checked')?.value || 'Foto');
  const tk = getTypeKey(platform, type);
  const date = document.getElementById('fDate').value;
  const caption = document.getElementById('fCaption').value.trim();
  const permalink = document.getElementById('fPermalink').value.trim();
  const mediaUrl = document.getElementById('fMediaUrl').value.trim() || currentMediaUrl;

  if (!date) return alert('Datum ist Pflichtfeld.');

  const metrics = METRICS_BY_TYPE[tk] || [];
  const insights = {};
  metrics.forEach(m => {
    const val = document.getElementById('m_' + m.key)?.value;
    if (val !== '' && val != null) insights[m.key] = parseFloat(val);
  });

  const post = { id: genId(), platform, type, typeKey: tk, date, caption, mediaUrl, permalink: type === 'Story' ? '' : permalink, insights };

  if (postIdx >= 0) {
    post.id = clients[code].campaigns[campIdx].posts[postIdx].id || post.id;
    clients[code].campaigns[campIdx].posts[postIdx] = post;
  } else {
    if (!clients[code].campaigns[campIdx].posts) clients[code].campaigns[campIdx].posts = [];
    clients[code].campaigns[campIdx].posts.push(post);
  }

  saveClients();
  showCampaignDetail(code, campIdx);
}

function fileToBase64(file) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.readAsDataURL(file);
  });
}

function dataUrlToBase64(dataUrl) {
  return dataUrl.split(',')[1];
}

function dataUrlToMediaType(dataUrl) {
  const match = dataUrl.match(/data:([^;]+);/);
  return match ? match[1] : 'image/png';
}

async function handleCoverDrop(e) {
  e.preventDefault();
  e.currentTarget.classList.remove('dragover');
  const file = e.dataTransfer.files[0];
  if (file) await setCoverFile(file);
}

async function handleCoverSelect(e) {
  const file = e.target.files[0];
  if (file) await setCoverFile(file);
}

async function setCoverFile(file) {
  screenshotCoverData = await fileToBase64(file);
  const zone = document.getElementById('coverDrop');
  zone.classList.add('has-files');
  zone.innerHTML = `<div class="preview-single"><img src="${screenshotCoverData}" alt="Cover"></div>
    <input type="file" id="coverInput" accept="image/*" onchange="handleCoverSelect(event)">`;
  updateAnalyzeBtn();
}

async function handleInsightsDrop(e) {
  e.preventDefault();
  e.currentTarget.classList.remove('dragover');
  const files = [...e.dataTransfer.files].filter(f => f.type.startsWith('image/')).slice(0, 5);
  for (const file of files) {
    if (screenshotInsightsData.length < 5) {
      screenshotInsightsData.push(await fileToBase64(file));
    }
  }
  renderInsightsPreviews();
}

async function handleInsightsSelect(e) {
  const files = [...e.target.files].slice(0, 5);
  screenshotInsightsData = [];
  for (const file of files) {
    screenshotInsightsData.push(await fileToBase64(file));
  }
  renderInsightsPreviews();
}

function renderInsightsPreviews() {
  const zone = document.getElementById('insightsDrop');
  if (screenshotInsightsData.length > 0) {
    zone.classList.add('has-files');
    zone.innerHTML = `<div class="preview-grid">${screenshotInsightsData.map(d => `<img src="${d}" alt="Insight">`).join('')}</div>
      <input type="file" id="insightsInput" accept="image/*" multiple onchange="handleInsightsSelect(event)">`;
  }
  updateAnalyzeBtn();
}

async function analyzeScreenshots(code, campIdx) {
  const area = document.getElementById('analyzeArea');
  area.innerHTML = `<div class="analyze-status"><div class="spinner"></div><br>Screenshots werden analysiert...</div>`;

  const images = screenshotInsightsData.map(d => ({
    data: dataUrlToBase64(d),
    media_type: dataUrlToMediaType(d),
  }));

  try {
    const res = await fetch('/api/extract', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ images }),
    });

    const json = await res.json();

    if (!res.ok || !json.success) {
      area.innerHTML = `<div class="analyze-status" style="color:var(--red);">Fehler: ${json.error || 'Unbekannter Fehler'}<br><br>
        <button class="btn btn-secondary" onclick="showScreenshotUpload('${code}', ${campIdx})">Nochmal versuchen</button></div>`;
      return;
    }

    const data = json.data;
    // Build prefill post object
    const prefill = {
      platform: data.platform || 'instagram',
      type: data.type || 'Foto',
      typeKey: getTypeKey(data.platform || 'instagram', data.type || 'Foto'),
      date: data.date || '',
      caption: data.caption || '',
      permalink: data.permalink || '',
      mediaUrl: screenshotCoverData || '',
      insights: data.insights || {},
    };

    showPostForm(code, campIdx, undefined, prefill);

  } catch (err) {
    area.innerHTML = `<div class="analyze-status" style="color:var(--red);">Verbindungsfehler: ${err.message}<br><br>
      <button class="btn btn-secondary" onclick="showScreenshotUpload('${code}', ${campIdx})">Nochmal versuchen</button></div>`;
  }
}

// ═══════════════════════════════════════════════════════════════
//  IMPORT / EXPORT
// ═══════════════════════════════════════════════════════════════
function exportJSON() {
  const blob = new Blob([JSON.stringify(clients, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'dashboard-clients.json';
  a.click();
}

function importJSON(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      const data = JSON.parse(ev.target.result);
      clients = data;
      saveClients();
      showClientList();
    } catch (err) {
      alert('Ungültige JSON-Datei.');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
}
